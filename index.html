// Session logger state lives outside re-render
let _logState = null;
function renderSessionLogger(id) {
  const r = S.routines.find(x => x.id === id);
  if (!r) {
    return `<div class="glass p-5" style="text-align:center;color:rgba(255,255,255,0.55)">Routine not found.<button onclick="setGymView('list')" style="display:block;margin:12px auto;background:none;border:none;color:rgba(255,255,255,0.85);font-size:12px">Back</button></div>`;
  }
  const sessions = S.sessions.filter(s => s.routineId === id);
  const last = sessions.sort((a,b) => b.ts - a.ts)[0];

  // Init state if needed
  if (!_logState || _logState.routineId !== id) {
    _logState = { routineId: id, data: {} };
    r.exercises.forEach(ex => {
      const ls = last?.exercises?.[ex.id];
      _logState.data[ex.id] = ls?.length
        ? ls.map(s => ({ reps: s.reps, weight: s.weight }))
        : [{ reps: 8, weight: 0 }];
    });
  }

  let totalVol = 0;
  Object.entries(_logState.data).forEach(([exId, sets]) => {
    const ex = r.exercises.find(e => e.id === exId);
    sets.forEach(s => totalVol += (s.reps||0) * effectiveLoad(ex, s.weight));
  });

  return `
    <div class="glass p-5">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <button onclick="cancelLog()" style="width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#fff">${icon('back', 14)}</button>
        <div style="flex:1;min-width:0">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.22em;color:rgba(248,113,113,0.8)">Logging</div>
          <h2 class="section-title" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(r.name)}</h2>
        </div>
        <div style="text-align:right">
          <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4)">Volume</div>
          <div id="vol-total" style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:#D9534F">${Math.round(totalVol)}</div>
        </div>
      </div>

      <div>
      ${r.exercises.map(ex => {
        const lastSets = last?.exercises?.[ex.id];
        const pr = S.prs[ex.id];
        const sets = _logState.data[ex.id] || [];
        const isBw = ex.type === 'bodyweight';
        return `
          <div style="border-radius:16px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);padding:12px;margin-bottom:12px" data-ex="${ex.id}">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
              <div style="display:flex;align-items:center;gap:8px;min-width:0">
                <span style="color:${isBw?'#7AB17A':'rgba(255,255,255,0.55)'};flex-shrink:0">${icon(isBw?'flame':'dumbbell', 14)}</span>
                <span style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.95);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escapeHtml(ex.name)}${isBw?` <span style="font-size:9px;color:#7AB17A;letter-spacing:0.06em;text-transform:uppercase;margin-left:4px">BW</span>`:''}</span>
              </div>
              ${pr && pr.topWeight > 0 ? `<span style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(252,211,77,0.8);font-variant-numeric:tabular-nums;flex-shrink:0">PR ${Math.round(pr.topWeight*10)/10}kg${isBw?' eff.':''}</span>` : ''}
            </div>

            ${isBw ? `
              <div style="font-size:10px;color:rgba(122,177,122,0.75);background:rgba(122,177,122,0.06);border:1px solid rgba(122,177,122,0.2);padding:6px 8px;border-radius:6px;margin-bottom:8px;line-height:1.4">

                Effective load per rep: BW (${S.bodyweight}kg) + added.
              </div>
            ` : ''}

            ${lastSets && lastSets.length > 0 ? `
              <div style="border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.04);padding:8px;margin-bottom:8px">
                <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4);margin-bottom:4px">Last session — beat this</div>
                <div style="display:flex;flex-wrap:wrap;gap:4px">
                  ${lastSets.map(s => `<div style="font-size:10px;font-variant-numeric:tabular-nums;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.55)">${s.reps}×${isBw?(s.weight>=0?'+':'')+s.weight:s.weight}</div>`).join('')}
                </div>

            ` : ''}

            <div data-sets="${ex.id}">
              ${sets.map((s,i) => setRowHTML(ex.id, i, s, lastSets?.[i], ex)).join('')}
            </div>
            <button onclick="addLogSet('${ex.id}')" style="width:100%;font-size:11px;padding:6px 0;margin-top:6px;border-radius:8px;border:1px dashed rgba(255,255,255,0.1);background:transparent;color:rgba(255,255,255,0.55)">+ Set</button>

        <button onclick="submitLog()" style="flex:1;height:40px;border-radius:999px;font-size:12px;font-weight:600;background:#D9534F;color:#fff;border:none;box-shadow:0 0 16px rgba(217,83,79,0.3)">Complete · +${XP.GYM_SESSION} XP</button>
      </div>
    </div>`;
}

function setRowHTML(exId, i, s, ref, ex) {
  let beating = '';
  if (ref) {
    const refEff = effectiveLoad(ex, ref.weight);
    const curEff = effectiveLoad(ex, s.weight);
    const cur = (s.reps||0) * curEff;
    const old = (ref.reps||0) * refEff;
    if (cur > old && cur > 0) beating = `<span style="color:rgba(110,231,183,0.85)">${icon('up', 11)}</span>`;
    else if (cur > 0 && cur < old) beating = `<span style="color:rgba(248,113,113,0.7)">${icon('down', 11)}</span>`;
  }
  const isBw = ex && ex.type === 'bodyweight';
  // For bodyweight: weight = added load (negative = assistance)
  const weightStep = isBw ? '1' : '0.5';
  const unitLabel = isBw ? '+kg' : 'kg';
  return `
    <div class="set-row">
      <span class="set-label">#${i+1}</span>
      <input type="number" inputmode="numeric" value="${s.reps}" oninput="updateSet('${exId}', ${i}, 'reps', this.value)" />
      <span class="set-unit">reps</span>
      <input type="number" inputmode="decimal" step="${weightStep}" value="${s.weight}" oninput="updateSet('${exId}', ${i}, 'weight', this.value)" />
      <span class="set-unit">${unitLabel}</span>
      <span style="width:16px;display:flex;align-items:center;justify-content:center">${beating}</span>
      ${(_logState.data[exId]||[]).length > 1 ? `<button onclick="removeLogSet('${exId}', ${i})" style="width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:rgba(255,255,255,0.4)">${icon('x', 10)}</button>` : ''}
    </div>`;
}

window.updateSet = function(exId, i, key, v) {
  if (!_logState) return;
  const num = parseFloat(v) || 0;
  _logState.data[exId][i][key] = num;
  // Recompute total volume in place — use effective load so bodyweight counts properly
  const routine = S.routines.find(r => r.id === _logState.routineId);
  let tv = 0;
  Object.entries(_logState.data).forEach(([eid, sets]) => {
    const ex = routine?.exercises.find(e => e.id === eid);
    sets.forEach(s => tv += (s.reps||0) * effectiveLoad(ex, s.weight));
  });
  const el = document.getElementById('vol-total');
  if (el) el.textContent = Math.round(tv);
};
window.addLogSet = function(exId) {
  if (!_logState) return;
  const last = _logState.data[exId][_logState.data[exId].length - 1];
  _logState.data[exId].push({ reps: last?.reps || 8, weight: last?.weight || 0 });
  render();
};
window.removeLogSet = function(exId, i) {
  if (!_logState) return;
  _logState.data[exId] = _logState.data[exId].filter((_, idx) => idx !== i);
  render();
};
window.cancelLog = function() {
  _logState = null;
  UI.gymView = { kind: 'list' };
  render();
};
window.submitLog = function() {
  if (!_logState) return;
  const data = _logState.data;
  const id = _logState.routineId;
  _logState = null;
  logSession(id, data);
};

        <button onclick="addNutrition(0,25)" style="height:36px;border-radius:10px;background:rgba(217,83,79,0.14);border:1px solid rgba(217,83,79,0.35);color:#E07975;font-size:12px;font-weight:600">+25g protein</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px">
        <button onclick="addNutrition(250,0)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+250 cals</button>
        <button onclick="addNutrition(500,0)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+500 cals</button>
        <button onclick="addNutrition(0,10)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+10g protein</button>
      </div>

      <!-- Exact input -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:8px">From label</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <input type="number" id="fuel-cals-input" placeholder="Calories" inputmode="numeric" style="text-align:center;font-variant-numeric:tabular-nums;padding:10px;font-size:14px" />
        <input type="number" id="fuel-protein-input" placeholder="Protein (g)" inputmode="numeric" style="text-align:center;font-variant-numeric:tabular-nums;padding:10px;font-size:14px" />
      </div>
      <button onclick="submitExactNutrition()" style="width:100%;height:38px;border-radius:10px;background:rgba(255,255,255,0.95);color:rgba(0,0,0,0.9);border:none;font-weight:600;font-size:13px;margin-bottom:8px">Add Exact Amount</button>

      <!-- Undo / Reset -->
      <div style="display:flex;gap:8px;margin-top:8px">
        <button id="fuel-undo" onclick="undoLastNutrition()" ${hasEntries?'':'disabled'} style="flex:1;height:32px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.65);font-size:11px;display:inline-flex;align-items:center;justify-content:center;gap:6px;${hasEntries?'':'opacity:0.4'}">
          ${icon('undo', 11)} Undo last
        </button>
        <button onclick="confirmResetToday()" style="flex:1;height:32px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,150,150,0.85);font-size:11px">Reset today</button>
      </div>
    </div>

    <!-- History -->
    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 class="section-title">Fuel History</h2>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4)">Last 60 days</span>
      </div>
      <div id="fuel-history-list" style="max-height:50vh;overflow-y:auto;padding-right:4px">
        ${renderFuelHistoryItems()}
      </div>
    </div>
  `;
}

window.addNutrition = addNutrition;
window.undoLastNutrition = undoLastNutrition;
window.submitExactNutrition = function() {
  const cIn = document.getElementById('fuel-cals-input');
  const pIn = document.getElementById('fuel-protein-input');
  const c = parseInt(cIn.value) || 0;
  const p = parseInt(pIn.value) || 0;
  if (c === 0 && p === 0) return;
  addNutrition(c, p);
  cIn.value = '';
  pIn.value = '';
};
let _resetConfirm = false;
window.confirmResetToday = function() {
  if (_resetConfirm) {
    resetToday();
    _resetConfirm = false;
    return;
  }
  _resetConfirm = true;
  // Visual confirm — find the button and re-label it briefly
  const btns = document.querySelectorAll('button');
  let target = null;
  btns.forEach(b => { if (b.textContent.trim() === 'Reset today') target = b; });
  if (target) {
    const orig = target.textContent;
    target.textContent = 'Tap again to confirm';
    target.style.color = '#E07975';
    setTimeout(() => {
      if (target) {
        try { target.textContent = orig; target.style.color = 'rgba(255,150,150,0.85)'; } catch {}
      }
      _resetConfirm = false;
    }, 3000);
  }
};


/* ============================================================
   MAIN RENDER
   ============================================================ */
window.setTab = function(t) {
  UI.tab = t;
  if (t !== 'gym') { UI.gymView = { kind: 'list' }; _logState = null; }
  render();
};

function render() {
  try {
    _render();
    // Start focus timer ticker on first render
    startFocusUpdater();
  } catch (e) {
    console.error('Render failed:', e);
    try {
      document.getElementById('app').innerHTML = `
        <div style="max-width:480px;margin:60px auto;padding:24px">
          <div class="glass p-5" style="text-align:center">
            <div style="color:rgba(248,113,113,0.85);margin-bottom:12px">${icon('alert', 32)}</div>
            <h3 style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.95);margin:0 0 8px">Something went wrong</h3>
            <p style="font-size:13px;color:rgba(255,255,255,0.6);margin:0 0 16px;line-height:1.5">The app caught a render error. Tap below to retry. Your data is preserved.</p>
            <details style="text-align:left;margin-bottom:16px;font-size:11px;color:rgba(255,255,255,0.45);background:rgba(255,255,255,0.03);padding:8px;border-radius:8px">
              <summary style="cursor:pointer">Error details</summary>
              <pre style="white-space:pre-wrap;word-break:break-word;margin:8px 0 0">${escapeHtml(String(e && e.message || e))}</pre>
            </details>
            <button onclick="render()" class="btn-primary">Retry</button>
          </div>
        </div>`;
    } catch {}
  }
}

function _render() {
  const disc = discipline();
  const inUrgency = disc < 50;
  const isElite = disc >= 90;
  const totalLv = calcTotalLevel(S.pillars);

  document.body.classList.toggle('urgency', inUrgency);
  document.body.classList.toggle('elite', isElite);

  let content = '';
  if (UI.tab === 'dashboard') content = renderDashboard();
  else if (UI.tab === 'quests') content = renderQuests();
  else if (UI.tab === 'arena')  content = renderArena();
  else if (UI.tab === 'gym')    content = renderGym();
  else if (UI.tab === 'fuel')   content = renderFuel();
  else if (UI.tab === 'focus')  content = renderFocus();

  const accent = inUrgency ? '#D9534F' : isElite ? '#E5B872' : '#7B6FB0';

  const shieldOn = shieldActive();
  const shieldHrsLeft = shieldOn ? Math.ceil((S.shieldActiveUntil - Date.now()) / 3600000) : 0;

  document.getElementById('app').innerHTML = `
    <header>
      <div>
        <div class="eyebrow">Productivity engine</div>
        <h1>Foundry<span style="color:${accent}"> OS</span><span style="color:${accent}">.</span></h1>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <div style="display:inline-flex;align-items:center;gap:6px">
          <button onclick="openModal('cold-storage')" title="Cold Storage" aria-label="Cold Storage" style="width:26px;height:26px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.10);color:rgba(255,255,255,0.6);display:inline-flex;align-items:center;justify-content:center;cursor:pointer;padding:0">
            ${icon('settings', 12)}
          </button>
          <span id="header-lv" class="lv-pill ${isElite?'elite':''}">LV ${String(totalLv).padStart(2,'0')}</span>
        </div>
        <button onclick="openModal('armory')" style="display:inline-flex;align-items:center;gap:4px;font-size:10px;letter-spacing:0.08em;padding:2px 8px;border-radius:999px;background:rgba(201,150,100,0.12);border:1px solid rgba(201,150,100,0.4);color:#C99664;cursor:pointer">
          ${icon('shield', 9)} <span id="header-credits">${(S.credits||0).toLocaleString()}</span>
        </button>
        ${shieldOn ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;letter-spacing:0.08em;padding:2px 6px;border-radius:999px;background:rgba(74,144,194,0.15);border:1px solid rgba(74,144,194,0.4);color:#4A90C2;text-shadow:0 0 6px rgba(74,144,194,0.5);box-shadow:0 0 12px rgba(74,144,194,0.25)">${icon('shield', 8)} ${shieldHrsLeft}h</span>` : ''}
        ${xpBuffActive() ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:9px;letter-spacing:0.08em;padding:2px 6px;border-radius:999px;background:rgba(229,184,114,0.15);border:1px solid rgba(229,184,114,0.45);color:#E5B872;text-shadow:0 0 6px rgba(229,184,114,0.5);box-shadow:0 0 12px rgba(229,184,114,0.25)">${icon('sparkles', 8)} 1.5×</span>` : ''}
        ${S.ascensionPoints > 0 ? `<button class="ap-pill" onclick="openModal('ascension')">${icon('star', 9)} <span id="header-ap">${S.ascensionPoints}</span> AP</button>` : ''}
      </div>
    </header>
    <div class="tab-content">${content}</div>
  `;

  // Tab bar
  const tabs = [
    { id: 'dashboard', label: 'Dash',     icon: 'home' },
    { id: 'quests',    label: 'Quests',   icon: 'scroll' },
    { id: 'focus',     label: 'Focus',    icon: 'clock' },
    { id: 'arena',     label: 'Arena',    icon: 'swords' },
    { id: 'gym',       label: 'Gym',      icon: 'dumbbell' },
    { id: 'fuel',      label: 'Fuel',     icon: 'utensils' },
  ];
  document.getElementById('tabbar').innerHTML = tabs.map(t => `
    <button class="tab-btn ${UI.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${icon(t.icon, 18)}
      <span>${t.label}</span>
    </button>
  `).join('');

  // Modals
  if (UI.modal) {
    const m = UI.modal;
    let html = '';
    if (m.kind === 'habit') html = modalHabit();
    else if (m.kind === 'habit-edit') html = modalHabit(JSON.parse(m.data));
    else if (m.kind === 'routine') html = modalRoutine();
    else if (m.kind === 'boss') html = modalBoss();
    else if (m.kind === 'ascension') html = modalAscension();
    else if (m.kind === 'sleep-history') html = modalSleepHistory();
    else if (m.kind === 'water-history') html = modalWaterHistory();
    else if (m.kind === 'networth-history') html = modalNetWorthHistory();
    else if (m.kind === 'fuel-goals') html = modalFuelGoals();
    else if (m.kind === 'armory') html = modalArmory();
    else if (m.kind === 'journal') html = modalJournal();
    else if (m.kind === 'cold-storage') html = modalColdStorage();
    else if (m.kind === 'bodyweight') html = modalBodyweight();

    document.getElementById('overlays').innerHTML = html;

    if (m.kind === 'habit') attachHabitModalHandlers(null);
    else if (m.kind === 'habit-edit') attachHabitModalHandlers(JSON.parse(m.data));
    else if (m.kind === 'routine') attachRoutineModalHandlers();
    else if (m.kind === 'boss') attachBossModalHandlers();
  } else if (!document.getElementById('overlays').querySelector('.fs-overlay')) {
    // Don't clear if a fullscreen overlay (level up, death, etc) is showing
    document.getElementById('overlays').innerHTML = '';
  }

}

/* ============================================================
   INIT
   ============================================================ */
render();
decayTick();
setInterval(decayTick, 30000);

// Re-render every minute for time-sensitive UI (countdowns, etc)
setInterval(() => {
  if (UI.tab === 'arena') render();
}, 60000);

// Death watcher in case HP hits 0 from a weird state
setInterval(() => {
  if (S.hp <= 0 && !document.querySelector('.fs-overlay')) showDeath();
}, 5000);

/* ============================================================
   SWIPE NAVIGATION
   ============================================================ */
// Swipe left = next tab, swipe right = previous tab.
// Listens on the scroller element so vertical scrolling still works normally.
(function() {
  const TAB_ORDER = ['dashboard', 'quests', 'focus', 'arena', 'gym', 'fuel'];
  const SWIPE_MIN_X = 70;          // minimum horizontal travel in px
  const SWIPE_MAX_Y = 60;          // maximum vertical drift allowed
  const SWIPE_MAX_TIME = 600;      // maximum gesture duration in ms

  let startX = 0, startY = 0, startT = 0, tracking = false;

  function isInteractiveTarget(el) {
    // Don't hijack swipes that start on inputs, sliders, scrollable rows,
    // buttons within scrolling content, or inside modals.
    while (el && el !== document.body) {
      const tag = (el.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
      if (tag === 'button') return true;
      // Inside an open modal or fullscreen overlay
      if (el.classList && (el.classList.contains('modal-backdrop') || el.classList.contains('fs-overlay'))) return true;
      // Horizontally scrollable content (chip rows in Quests)
      if (el.classList && el.classList.contains('chip-scroll')) return true;
      el = el.parentElement;
    }
    return false;
  }

  const scroller = document.getElementById('scroller');
  if (!scroller) return;

  scroller.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    if (isInteractiveTarget(e.target)) { tracking = false; return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
    tracking = true;
  }, { passive: true });

  scroller.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (dt > SWIPE_MAX_TIME) return;
    if (Math.abs(dy) > SWIPE_MAX_Y) return;
    if (Math.abs(dx) < SWIPE_MIN_X) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.5) return; // require strong horizontal bias

    // Don't switch tabs if a modal or fullscreen overlay is open
    if (document.querySelector('.modal-backdrop') || document.querySelector('.fs-overlay')) return;
    // Don't switch if user is in a gym sub-view (detail/log) — let them back out manually
    if (UI.tab === 'gym' && UI.gymView && UI.gymView.kind !== 'list') return;

    const curIdx = TAB_ORDER.indexOf(UI.tab);
    if (curIdx === -1) return;
    let nextIdx;
    if (dx < 0) {
      // swipe left → next tab
      nextIdx = curIdx + 1;
      if (nextIdx >= TAB_ORDER.length) return;
    } else {
      // swipe right → previous tab
      nextIdx = curIdx - 1;
      if (nextIdx < 0) return;
    }
    setTab(TAB_ORDER[nextIdx]);
    // Reset scroll position after tab change feels cleaner
    scroller.scrollTop = 0;
  }, { passive: true });
})();
</script>
