<style>
/* ============================================================
   FOUNDRY OS. — single-file build
   ============================================================ */

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
/* Make the html root also draw the dark color so any wrapper gap blends in */
html { background: #0a0a0c; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
  background: #0a0a0c;
  color: #fff;
  /* Lock the page itself; only the inner scroller scrolls. Prevents pull-to-refresh in WebView. */
  overflow: hidden;
  overscroll-behavior: none;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  -webkit-font-smoothing: antialiased;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
/* Dedicated scrolling container — only this scrolls, so the OS never sees the page itself reach the top. */
#scroller {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}
button, input { font-family: inherit; }
button { cursor: pointer; }
input, textarea {
  -webkit-user-select: text; user-select: text;
  color: rgba(255,255,255,0.95) !important;
  caret-color: rgba(255,255,255,0.85);
  background-color: rgba(255,255,255,0.04) !important;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  width: 100%;
}
input:focus, textarea:focus {
  background-color: rgba(255,255,255,0.06) !important;
  border-color: rgba(255,255,255,0.25);
}
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35) !important; }
input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
  -webkit-text-fill-color: rgba(255,255,255,0.95) !important;
  -webkit-box-shadow: 0 0 0 1000px #1a1a1f inset !important;
  transition: background-color 5000s ease-in-out 0s;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }
input[type="range"] { accent-color: #7B6FB0; padding: 0; background: transparent !important; border: none; }
/* Hide scrollbars globally — scrolling still works, just no visible bar */
::-webkit-scrollbar { width: 0; height: 0; display: none; }
::-webkit-scrollbar-thumb { background: transparent; }
* { scrollbar-width: none; -ms-overflow-style: none; }

/* App background */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 90% 60% at 20% 0%, rgba(74,144,194,0.10), transparent 60%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(123,111,176,0.10), transparent 60%);
  transition: background 0.6s ease;
}
body.urgency::before {
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(217,83,79,0.18), transparent 60%);
  background-color: #1a0a0c;
}
body.elite::before {
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(229,184,114,0.12), transparent 60%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(123,111,176,0.10), transparent 60%);
}

#app {
  position: relative; z-index: 1;
  max-width: 640px; margin: 0 auto;
  padding: calc(max(env(safe-area-inset-top), 44px) + 8px) 16px 140px 16px;
}

/* Glass card */
.glass {
  position: relative;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 24px rgba(0,0,0,0.3);
}
.glass.p-5 { padding: 20px; }
.glass.p-4 { padding: 16px; }

/* Header */
header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; color: rgba(255,255,255,0.95); }
.eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.28em; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
.lv-pill {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
  padding: 6px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
}
.lv-pill.elite {
  background: rgba(229,184,114,0.12);
  border-color: rgba(229,184,114,0.4);
  color: #E5B872;
  box-shadow: 0 0 12px rgba(229,184,114,0.25);
}
.ap-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; letter-spacing: 0.18em;
  padding: 2px 8px; border-radius: 999px;
  background: rgba(229,184,114,0.12);
  border: 1px solid rgba(229,184,114,0.4);
  color: #E5B872;
  margin-top: 4px;
  cursor: pointer;
}

/* Tab bar */
#tabbar {
  position: fixed; left: 12px; right: 12px;
  bottom: max(env(safe-area-inset-bottom), 20px);
  z-index: 30;
  max-width: 616px; margin: 0 auto;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  display: flex; justify-content: space-around;
  padding: 8px 6px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tab-btn {
  flex: 1; min-width: 0;
  background: transparent; border: none;
  padding: 8px 4px; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: rgba(255,255,255,0.45);
  transition: color 0.2s, background 0.2s;
  position: relative;
}
.tab-btn.active {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.95);
}
.tab-btn span { font-size: 9px; font-weight: 500; letter-spacing: 0.04em; }
.tab-btn svg { width: 18px; height: 18px; }

/* Buttons */
.btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.85);
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.10); }
.btn-primary {
  background: rgba(255,255,255,0.95);
  color: rgba(0,0,0,0.9);
  border: none;
  padding: 12px 20px; border-radius: 14px;
  font-weight: 600; font-size: 14px;
  width: 100%;
}
.btn-danger {
  background: #D9534F; color: #fff; border: 1px solid #D9534F;
  padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
}
.btn-pillar { padding: 6px 16px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid; }
.btn[disabled], button[disabled] { opacity: 0.5; cursor: not-allowed; }

/* Stat bar */
.statbar {
  width: 100%; height: 6px; background: rgba(255,255,255,0.06);
  border-radius: 999px; overflow: hidden;
}
.statbar > div { height: 100%; border-radius: 999px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0.85; }

/* Ring */
.ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-wrap circle { transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-sub { font-size: 8px; text-transform: uppercase; letter-spacing: 0.22em; color: rgba(255,255,255,0.45); font-weight: 500; }
.ring-val { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.95); font-variant-numeric: tabular-nums; }

/* Pillar card */
.pillar-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
}
.pillar-card .pc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pillar-card .pc-name { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.85); display: flex; align-items: center; gap: 6px; }
.pillar-card .pc-lv { font-size: 10px; padding: 2px 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
.pillar-card .pc-xp { display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Habit / Routine row */
.row-card {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
}
.row-card .row-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.row-card .row-icon {
  width: 40px; height: 40px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.row-card .row-name { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.95); line-height: 1.3; word-break: break-word; }
.row-card .row-meta {
  display: flex; flex-wrap: wrap; gap: 4px 8px;
  font-size: 11px; color: rgba(255,255,255,0.50); margin-top: 4px;
}
.row-card .row-actions {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); gap: 8px;
}
.row-card .row-actions-left { display: flex; gap: 6px; }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center; padding: 16px;
  animation: fadeIn 0.2s ease;
}
@media (min-width: 640px) { .modal-backdrop { align-items: center; } }
.modal {
  width: 100%; max-width: 440px;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  background: rgba(21,21,26,0.95);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px; padding: 24px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
}
.modal-head h3 { margin: 0; font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.95); }
.modal-close {
  width: 32px; height: 32px; border-radius: 999px;
  background: rgba(255,255,255,0.06); border: none;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7);
}
.modal label { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-form > div + div { margin-top: 16px; }

/* Floating XP */
.float-xp {
  position: fixed; bottom: 30%;
  font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums;
  pointer-events: none; z-index: 40;
  animation: floatUp 1.4s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
  20% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -120px) scale(1); }
}

/* Full-screen overlays */
.fs-overlay {
  position: fixed; inset: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.6);
  animation: fadeIn 0.3s ease;
}
.fs-content {
  text-align: center; padding: 0 24px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn { from { transform: scale(0.7) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.fs-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.32em; color: rgba(255,255,255,0.55); margin-bottom: 8px; }
.fs-big { font-size: 68px; font-weight: 600; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.95); line-height: 1; }
.fs-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; }

/* Tab content fade */
.tab-content {
  animation: tabIn 0.25s ease;
}
@keyframes tabIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Shake for damage */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake 0.5s; }

/* Volume chart bar */
.vol-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); min-height: 2px; border-radius: 4px 4px 0 0; }

/* Chat bubble */
.bubble {
  max-width: 85%; padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; white-space: pre-line;
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  word-wrap: break-word;
}
.bubble.user { background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); align-self: flex-end; }
.bubble.system { background: rgba(123,111,176,0.10); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); align-self: flex-start; }

/* Misc grid utils */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }

/* Day chip */
.day-chip {
  width: 100%; height: 32px; font-size: 10px; font-weight: 500;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.55);
}
.day-chip.selected {
  background: rgba(217,83,79,0.18);
  border-color: rgba(217,83,79,0.45);
  color: #E07975;
}

/* Set logger row */
.set-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.set-row input { padding: 6px 8px; font-size: 12px; text-align: center; }
.set-row .set-label { font-size: 10px; color: rgba(255,255,255,0.4); width: 24px; }
.set-row .set-unit { font-size: 10px; color: rgba(255,255,255,0.35); }

/* Progress segment */
.seg-bar {
  display: flex; padding: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  margin-bottom: 12px;
}
.seg-bar button {
  flex: 1; padding: 6px 12px; border-radius: 10px;
  background: transparent; border: none;
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  transition: all 0.2s;
}
.seg-bar button.active {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.95);
}

/* Scroll chips */
.chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin: -4px; padding-left: 4px; padding-right: 4px; }
.chip-scroll::-webkit-scrollbar { display: none; }

/* Section titles */
.section-title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); margin: 0; }
</style>
</head>

// When a subdivision is logged, the parent group also gets the recovery state.
// This keeps the "Back" / "Shoulders" / "Chest" overview accurate while letting
// individual paths in the muscle map show their own sub-state.
const MUSCLE_PARENT = (() => {
  const m = {};
  Object.entries(MUSCLE_GROUPS).forEach(([k, v]) => { if (v.parent) m[k] = v.parent; });
  return m;
})();

const xpForLevel = (lvl) => Math.floor(100 * Math.pow(lvl, 1.5));
const hoursSince = (ts) => (Date.now() - ts) / 36e5;
const daysSince = (ts) => (Date.now() - ts) / 86400000;
const dayKey = (d = new Date()) => d.toISOString().slice(0,10);

// Calendar days between two timestamps. Returns the integer difference.
// e.g. yesterday → today = 1, today → today = 0.
function calendarDaysSince(ts) {
  if (!ts) return Infinity;
  const a = new Date(ts); a.setHours(0,0,0,0);
  const b = new Date();   b.setHours(0,0,0,0);
  return Math.round((b - a) / 86400000);
}

// Habit "due today" check — calendar-based for daily habits, hours-based for weekly.
function habitDueToday(h) {
  if (!h.lastCheckIn) return true;
  if (h.frequency === 'daily') {
    return calendarDaysSince(h.lastCheckIn) >= 1;
  }
  // Weekly: use rolling 168-hour window
  return hoursSince(h.lastCheckIn) >= 168 * 0.9;
}

// Streak still safe? Daily habits keep streaks across one missed calendar day boundary
// (i.e. checked in yesterday counts as 'still going'). Broken if 2+ days missed.
function habitStreakBroken(h) {
  if (!h.lastCheckIn || h.streak === 0) return false;
  if (h.frequency === 'daily') {
    return calendarDaysSince(h.lastCheckIn) >= 2;
  }
  // Weekly: original rule — broken if > 1.5x the period
  return hoursSince(h.lastCheckIn) > 168 * 1.5;
}

// Continuation check used by checkInHabit to decide if streak increments or resets.
// For daily habits, you continue if your last check-in was today or yesterday.
function habitStreakContinues(h) {
  if (!h.lastCheckIn) return false;
  if (h.frequency === 'daily') {
    return calendarDaysSince(h.lastCheckIn) <= 1;
  }
  return hoursSince(h.lastCheckIn) < 168 * 1.5;
}

const startOfWeek = () => {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 6 : day - 1;
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - diff);
  return d.getTime();
};
const endOfWeek = () => {
  const d = new Date(startOfWeek());
  d.setDate(d.getDate() + 6);
  d.setHours(23,59,59,999);
  return d.getTime();
};

const calcTotalLevel = (pillars) => {
  const lvls = Object.values(pillars).map(p => p.level);
  return Math.max(1, Math.floor(lvls.reduce((a,b) => a+b, 0) / lvls.length));
};

const disciplineMultiplier = (d) => {
  if (d >= 90) return { mult: 1.5, tier: 'Elite',      color: '#E5B872' };
  if (d >= 70) return { mult: 1.2, tier: 'Consistent', color: '#7B6FB0' };
  if (d >= 50) return { mult: 1.0, tier: 'Steady',     color: '#C99664' };
  return            { mult: 0.5, tier: 'Slacking',   color: '#D9534F' };
};

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function discipline() {
  const cutoff = Date.now() - 30 * 86400000;
  const recent = S.disciplineEvents.filter(e => e.ts >= cutoff);
  const floor = S.ascensions?.disciplineFloor ? S.ascensions.disciplineFloor * 5 : 0;
  if (recent.length === 0) return Math.max(100, floor);
  const c = recent.filter(e => e.type === 'completion').length;
  return Math.max(Math.round((c / recent.length) * 100), floor);
}

function maxHp() { return S.maxHp + (S.ascensions?.hpMax || 0) * 10; }

/* ============================================================
   XP / LEVELING
   ============================================================ */
function applyXpToPillar(pillarKey, amount) {
  const p = { ...S.pillars[pillarKey] };
  let xp = p.xp + amount;
  let level = p.level;
  const ups = [];
  let needed = xpForLevel(level);
  let safety = 0;
  while (xp >= needed && safety < 50) {
    xp -= needed;
    level += 1;
    ups.push({ pillar: pillarKey, newLevel: level });
    needed = xpForLevel(level);
    safety++;
  }
  S.pillars[pillarKey] = { level, xp };
  return ups;
}

// Returns the ISO week key, e.g. '2026-W19', for use in weeklyXp tracking
function weekKey(d) {
  d = d ? new Date(d) : new Date();
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = (dt.getUTCDay() + 6) % 7;
  dt.setUTCDate(dt.getUTCDate() - dayNum + 3);
  const firstThursday = new Date(Date.UTC(dt.getUTCFullYear(), 0, 4));
  const diff = (dt - firstThursday) / 86400000;
  const week = 1 + Math.round((diff - 3 + ((firstThursday.getUTCDay() + 6) % 7)) / 7);
  return `${dt.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
}

function shieldActive() {
  return (S.shieldActiveUntil || 0) > Date.now();
}
function xpBuffActive() {
  return (S.xpBuffUntil || 0) > Date.now();
}

function awardXp(baseXp, pillarKey, applyMult = true) {
  if (!PILLARS[pillarKey]) pillarKey = 'intellect'; // safe fallback
  const m = applyMult ? disciplineMultiplier(discipline()).mult : 1;
  const ascBoost = 1 + (S.ascensions?.xpBoost || 0) * 0.05;
  const buff = xpBuffActive() ? 1.5 : 1;
  const finalXp = Math.max(0, Math.round(baseXp * m * ascBoost * buff));
  const ups = applyXpToPillar(pillarKey, finalXp);
  S.lifetimeXp += finalXp;
  S.credits = (S.credits || 0) + finalXp;
  S.ascensionPoints += ups.length;

  // Track weekly XP for Shadow Protocol
  const wk = weekKey();
  S.weeklyXp[wk] = (S.weeklyXp[wk] || 0) + finalXp;

  if (ups.length > 0) {
    const last = ups[ups.length - 1];
    showLevelUp(last.pillar, last.newLevel);
  }
  return finalXp;
}

function checkPerfectDay() {
  const today = dayKey();
  if (S.perfectDays.includes(today)) return;
  if (S.habits.length === 0) return;
  const allDone = S.habits.every(h => h.lastCheckIn && !habitDueToday(h));
  if (!allDone) return;
  S.perfectDays.push(today);
  const per = Math.floor(XP.PERFECT_DAY / 4);
  Object.keys(PILLARS).forEach(p => awardXp(per, p, true));
  spawnFloat(`PERFECT DAY +${XP.PERFECT_DAY} XP`, '#E5B872');
  S.log.unshift({ id: `${Date.now()}-perfect`, ts: Date.now(), type: 'victory',
    text: `🌟 PERFECT DAY · all habits cleared · +${XP.PERFECT_DAY} XP` });
}

function checkInHabit(id) {
  const h = S.habits.find(x => x.id === id);
  if (!h) return;
  if (!habitDueToday(h)) return; // already done today

  const continued = habitStreakContinues(h);
  const newStreak = continued ? h.streak + 1 : 1;
  const streakMult = newStreak >= 7 ? 1.5 : newStreak >= 3 ? 1.25 : 1;
  const habitXp = (typeof h.xp === 'number' && h.xp > 0) ? h.xp : XP.HABIT;
  const baseXp = Math.round(habitXp * streakMult);

  const p = PILLARS[h.pillar];
  const display = awardXp(baseXp, h.pillar);
  spawnFloat(`+${display} XP`, p.color);

  const healBase = (h.pillar === 'strength' || h.pillar === 'vitality' || h.pillar === 'resolve') ? 5 : 0;
  const heal = healBase + (S.ascensions?.healBoost || 0);
  S.hp = Math.min(maxHp(), S.hp + heal);

  h.streak = newStreak;
  h.lastCheckIn = Date.now();

  S.disciplineEvents = S.disciplineEvents
    .filter(e => e.ts >= Date.now() - 30*86400000)
    .concat({ ts: Date.now(), type: 'completion', source: 'habit', habitId: id });

  S.log.unshift({ id: `${Date.now()}-${id}`, ts: Date.now(), type: 'gain',
    text: `"${h.name}" complete · +${display} XP${streakMult>1?` · ${newStreak}🔥`:''}` });
  S.log = S.log.slice(0, 200);

  checkPerfectDay();
  persist();
  render();
}

function canUpdateNetWorth() {
  const last = S.netWorth.lastUpdate || 0;
  if (!last) return { ok: true };
  const daysSinceLast = (Date.now() - last) / 86400000;
  if (daysSinceLast < 30) {
    return { ok: false, daysLeft: Math.ceil(30 - daysSinceLast) };
  }
  return { ok: true };
}

function updateNetWorth(v) {
  const check = canUpdateNetWorth();
  if (!check.ok) return false;
  const prevVal = S.netWorth.history.length > 0
    ? S.netWorth.history[S.netWorth.history.length - 1].value
    : S.netWorth.value;
  S.netWorth.value = v;
  S.netWorth.lastUpdate = Date.now();
  S.netWorth.history = [...(S.netWorth.history || []).slice(-29), { ts: Date.now(), value: v }];
  // Capital XP on positive change
  if (v > prevVal) {
    // Scale XP with % gain — 1% = 50 XP, capped at 500 XP per update
    const pctGain = prevVal > 0 ? ((v - prevVal) / prevVal) * 100 : 1;
    const xpAmount = Math.min(500, Math.max(20, Math.round(pctGain * 50)));
    const gained = awardXp(xpAmount, 'capital');
    spawnFloat(`+${gained} XP · capital`, '#C99664');
  }
  persist(); render();
  return true;
}

// Effective load per rep, accounting for bodyweight exercises.
// - weighted: just the bar weight
// - bodyweight: bodyweight + added weight (added can be negative for assistance)
function effectiveLoad(exercise, weightInput) {
  const w = (typeof weightInput === 'number') ? weightInput : parseFloat(weightInput) || 0;
  if (exercise && exercise.type === 'bodyweight') {
    return Math.max(0, (S.bodyweight || 75) + w);
  }
  return w;
}

function logSession(routineId, exerciseSets) {
  const now = Date.now();
  const routine = S.routines.find(r => r.id === routineId);
  const session = { id: `s-${now}`, routineId, ts: now, completed: true, exercises: exerciseSets };

  let totalVolume = 0;
  const prList = [];
  const hitMuscles = new Set();
  // muscleVolume: how much effective volume each muscle absorbed in THIS session
  const muscleVolume = {};

  Object.entries(exerciseSets).forEach(([exId, sets]) => {
    const ex = routine?.exercises.find(e => e.id === exId);
    if (!ex) return;
    // Allow negative weights for assisted bodyweight movements
    const minWeight = ex.type === 'bodyweight' ? -1000 : 0;
    const valid = sets.filter(s => s.reps > 0 && s.weight >= minWeight);
    if (!valid.length) return;

    // Track effective loads for PR purposes
    const effLoads = valid.map(s => effectiveLoad(ex, s.weight));
    const topEffWeight = Math.max(...effLoads);
    // Volume uses effective load too — so bodyweight pulls accumulate real tonnage
    const vol = valid.reduce((sum, s, idx) => sum + s.reps * effLoads[idx], 0);
    totalVolume += vol;

    // Track which muscles got worked + how much volume they absorbed.
    // Volume is divided evenly across the muscles trained, then weighted by
    // primary/secondary priority (primary = first in list = 1.5x weight,
    // secondary = 0.75x). This matches how compounds actually fatigue muscles.
    if (Array.isArray(ex.muscles) && ex.muscles.length > 0) {
      ex.muscles.forEach((m, idx) => {
        hitMuscles.add(m);
        const priorityWeight = idx === 0 ? 1.5 : 0.75;
        const share = (vol / ex.muscles.length) * priorityWeight;
        muscleVolume[m] = (muscleVolume[m] || 0) + share;
      });
    }

    const exName = ex.name || 'Exercise';
    const existing = S.prs[exId] || { topWeight: 0, topVolume: 0, topWeightTs: 0, topVolumeTs: 0 };

    if (topEffWeight > existing.topWeight && existing.topWeight > 0) {
      S.prs[exId] = { ...existing, topWeight: topEffWeight, topWeightTs: now };
      prList.push({ exerciseName: exName, type: 'weight', value: Math.round(topEffWeight*10)/10, prev: Math.round(existing.topWeight*10)/10, isBodyweight: ex.type === 'bodyweight' });
    } else if (topEffWeight > 0 && existing.topWeight === 0) {
      S.prs[exId] = { ...existing, topWeight: topEffWeight, topWeightTs: now };
    }
    if (vol > existing.topVolume && existing.topVolume > 0) {
      S.prs[exId] = { ...(S.prs[exId] || existing), topVolume: vol, topVolumeTs: now };
      if (!prList.find(p => p.exerciseName === exName)) {
        prList.push({ exerciseName: exName, type: 'volume', value: Math.round(vol), prev: Math.round(existing.topVolume), isBodyweight: ex.type === 'bodyweight' });
      }
    } else if (vol > 0 && existing.topVolume === 0) {
      S.prs[exId] = { ...(S.prs[exId] || existing), topVolume: vol, topVolumeTs: now };
    }
  });

  // Track per-muscle hit history for recovery state.
  // When a subdivision (e.g. upperChest) is hit, also record the parent (chest)
  // so the overview state for the parent stays accurate.
  if (!S.muscleHits || typeof S.muscleHits !== 'object') S.muscleHits = {};
  const expandedVolumes = {};
  Object.keys(muscleVolume).forEach(m => {
    expandedVolumes[m] = muscleVolume[m];
    const parent = MUSCLE_PARENT[m];
    if (parent) {
      // Parent absorbs the full subdivision volume — back gets hit when lats are hit
      expandedVolumes[parent] = (expandedVolumes[parent] || 0) + muscleVolume[m];
    }
  });
  Object.entries(expandedVolumes).forEach(([m, vol]) => {
    if (!MUSCLE_GROUPS[m]) return;
    if (!Array.isArray(S.muscleHits[m])) S.muscleHits[m] = [];
    // Normalised load: volume × profile loadScale.
    // The profile.loadScale acts as a per-muscle calibration — smaller muscles
    // accumulate fatigue faster per unit of volume.
    const prof = profileFor(m);
    const load = Math.max(1, Math.round(vol * prof.loadScale));
    S.muscleHits[m].push({ ts: now, sessionId: session.id, load });
    // Keep last 200 hits per muscle
    if (S.muscleHits[m].length > 200) S.muscleHits[m] = S.muscleHits[m].slice(-200);
  });

  const baseGymXp = XP.GYM_SESSION + (prList.length * XP.PR_BONUS);
  const display = awardXp(baseGymXp, 'strength');
  spawnFloat(`+${display} XP`, '#D9534F');

  S.hp = Math.min(maxHp(), S.hp + 8 + (S.ascensions?.healBoost || 0));

  if (prList.length > 0) {
    showPR(prList[0]);
  }

  // Note: boss damage from workouts was removed in the Binary Boss refactor.
  // Bosses are now Pass/Fail on a custom deadline.

  S.sessions.push(session);
  S.disciplineEvents = S.disciplineEvents
    .filter(e => e.ts >= now - 30*86400000)
    .concat({ ts: now, type: 'completion', source: 'gym', routineId });

  const routineName = routine?.name || 'Workout';
  prList.forEach(pr => S.log.unshift({
    id: `${now}-pr-${pr.exerciseName}`, ts: now, type: 'pr',
    text: `🏆 PR: ${pr.exerciseName} — ${pr.type === 'weight' ? `${pr.value}kg${pr.isBodyweight?' (effective)':''}` : `${pr.value} vol`} (was ${pr.prev || '0'})`,
  }));
  S.log.unshift({ id: `${now}-session`, ts: now, type: 'gain',
    text: `Logged "${routineName}" · vol ${Math.round(totalVolume)} · +${display} XP${prList.length?` (${prList.length} PR${prList.length>1?'s':''})`:''}` });
  S.log = S.log.slice(0, 200);

  UI.gymView = { kind: 'list' };
  persist(); render();
}

// ============ NUTRITION ============
function ensureNutritionDay(key) {
  if (!S.nutrition[key]) S.nutrition[key] = { cals: 0, protein: 0, entries: [] };
  return S.nutrition[key];
}

function addNutrition(cals, protein) {
  cals = Math.max(0, parseInt(cals) || 0);
  protein = Math.max(0, parseInt(protein) || 0);
  if (cals === 0 && protein === 0) return;
  const today = dayKey();
  const day = ensureNutritionDay(today);
  const beforeCals = day.cals;
  const beforeProtein = day.protein;
  day.cals += cals;
  day.protein += protein;
  day.entries.push({ ts: Date.now(), cals, protein });
  // Vitality XP for crossing daily targets — once per day
  if (beforeProtein < S.nutritionGoals.protein && day.protein >= S.nutritionGoals.protein) {
    const gained = awardXp(25, 'vitality');
    spawnFloat(`+${gained} XP · protein goal`, '#7AB17A');
  }
  if (beforeCals < S.nutritionGoals.cals && day.cals >= S.nutritionGoals.cals) {
    const gained = awardXp(20, 'vitality');
    spawnFloat(`+${gained} XP · calorie goal`, '#7AB17A');
  }
  persist();
  updateFuelInPlace();
  updatePillarsInPlace();
}

function undoLastNutrition() {
  const today = dayKey();
  const day = S.nutrition[today];
  if (!day || day.entries.length === 0) return;
  const last = day.entries.pop();
  day.cals = Math.max(0, day.cals - last.cals);
  day.protein = Math.max(0, day.protein - last.protein);
  persist();
  updateFuelInPlace();
}

function resetToday() {
  const today = dayKey();
  if (S.nutrition[today]) {
    delete S.nutrition[today];
    persist();
  }
  updateFuelInPlace();
}

function setNutritionGoals(cals, protein) {
  if (cals && cals > 0) S.nutritionGoals.cals = Math.max(500, Math.min(10000, parseInt(cals)));
  if (protein && protein > 0) S.nutritionGoals.protein = Math.max(10, Math.min(500, parseInt(protein)));
  persist(); render();
}

function updateSleepCardInPlace() {
  // The sleep card uses ad-hoc IDs; only the displayed text needs to refresh
  const today = dayKey();
  const todaySleep = S.sleep.find(s => s.date === today) || S.sleep.slice(-1)[0];
  // Easiest: just hide editor and re-show display, but the actual values are in the parent
  // re-render the card via render() is too heavy — but we can update the visible text
  const display = document.getElementById('sleep-display');
  if (display && todaySleep) {
    // Rebuild the inner content cleanly
    const last7 = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(Date.now() - i*86400000);
      const e = S.sleep.find(s => s.date === dayKey(d));
      last7.push(e?.hours || 0);

function updatePillarsInPlace() {
  // Update each pillar level/XP and the total LV pill in the header
  Object.keys(PILLARS).forEach(k => {
    const pl = S.pillars[k];
    if (!pl) return;
    const needed = xpForLevel(pl.level);
    const lvEl = document.getElementById(`pillar-${k}-lv`);
    const barEl = document.getElementById(`pillar-${k}-bar`);
    const curEl = document.getElementById(`pillar-${k}-cur`);
    const needEl = document.getElementById(`pillar-${k}-need`);
    if (lvEl) lvEl.textContent = `LV ${pl.level}`;
    if (barEl) barEl.style.width = Math.min(100, (pl.xp / needed) * 100) + '%';
    if (curEl) curEl.textContent = pl.xp;
    if (needEl) needEl.textContent = needed;
  });
  // Header LV pill
  const totalEl = document.getElementById('header-lv');
  if (totalEl) totalEl.textContent = `LV ${String(calcTotalLevel(S.pillars)).padStart(2, '0')}`;
  // Credits + AP display
  const creditsEl = document.getElementById('header-credits');
  if (creditsEl) creditsEl.textContent = (S.credits || 0).toLocaleString();
  const apEl = document.getElementById('header-ap');
  if (apEl) apEl.textContent = S.ascensionPoints;
  // Lifetime XP
  const lxEl = document.getElementById('pillars-lifetime');
  if (lxEl) lxEl.textContent = `Total LV ${calcTotalLevel(S.pillars)} · ${S.lifetimeXp.toLocaleString()} XP`;
  // Shadow Protocol bar
  updateShadowInPlace();
}

function updateShadowInPlace() {
  const curWk = weekKey();
  const cur = S.weeklyXp[curWk] || 0;
  // Last completed week
  const lastWeekDate = new Date(Date.now() - 7 * 86400000);
  const lastWk = weekKey(lastWeekDate);
  const shadow = S.weeklyXp[lastWk] || 0;
  const youEl = document.getElementById('shadow-you-xp');
  const shadowEl = document.getElementById('shadow-shadow-xp');
  const youBar = document.getElementById('shadow-you-bar');
  const shadowBar = document.getElementById('shadow-shadow-bar');
  const maxVal = Math.max(cur, shadow, 100);
  if (youEl) youEl.textContent = cur.toLocaleString();
  if (shadowEl) shadowEl.textContent = shadow.toLocaleString();
  if (youBar) youBar.style.width = ((cur / maxVal) * 100) + '%';
  if (shadowBar) shadowBar.style.width = ((shadow / maxVal) * 100) + '%';
}

function spendAscension(key) {
  if (S.ascensionPoints <= 0) return;
  S.ascensions[key] = (S.ascensions[key] || 0) + 1;
  if (key === 'hpMax') {
    S.hp += 10;
  }
  S.ascensionPoints -= 1;
  persist(); render();
}


/* ============================================================
   DECAY TICK
   ============================================================ */
function decayTick() {
  const now = Date.now();
  let damage = 0;
  let changed = false;
  const cutoff = now - 30 * 86400000;
  S.disciplineEvents = S.disciplineEvents.filter(e => e.ts >= cutoff);
  const shielded = shieldActive();

  if (now - S.lastDecayCheck > 30000) {
    S.habits.forEach(h => {
      if (h.lastCheckIn === 0) return;
      // Break streak if a full calendar day has elapsed without check-in (for daily),
      // or the 168h * 1.5 grace passed (for weekly).
      if (habitStreakBroken(h) && h.streak > 0) {
        const lost = h.streak;
        const dmg = 6 + lost * 2;
        // Shield: no HP damage and no discipline event from missed habits
        if (!shielded) {
          damage += dmg;
          S.disciplineEvents.push({ ts: now, type: 'miss', source: 'habit', habitId: h.id });
          S.log.unshift({ id: `${now}-${h.id}-miss`, ts: now, type: 'miss',
            text: `Missed "${h.name}" — streak of ${lost} broken. −${dmg} HP.` });
        } else {
          S.log.unshift({ id: `${now}-${h.id}-shielded`, ts: now, type: 'gain',
            text: `Missed "${h.name}" — Tactical Shield absorbed the penalty.` });
        }
        h.streak = 0;
        changed = true;
      }
    });
    S.lastDecayCheck = now;
  }

  // Yesterday's missed gym
  const today = dayKey(new Date(now));
  const y = dayKey(new Date(now - 86400000));
  if (S.lastGymSkipCheck !== today) {
    const yDow = new Date(now - 86400000).getDay();
    const sched = S.routines.filter(r => r.schedule?.includes(yDow));
    sched.forEach(r => {
      const done = S.sessions.some(s => s.routineId === r.id && s.completed && dayKey(new Date(s.ts)) === y);
      if (!done) {
        if (!shielded) {
          damage += 8;
          S.disciplineEvents.push({ ts: now, type: 'miss', source: 'gym', routineId: r.id });
          S.log.unshift({ id: `${now}-${r.id}-skip`, ts: now, type: 'miss',
            text: `Skipped scheduled workout: "${r.name}". −8 HP.` });
        }
        changed = true;
      }
    });
    S.lastGymSkipCheck = today;
  }

  // Boss deadline reached — defer to user confirmation in the Arena
  if (S.boss && S.boss.deadline && now > S.boss.deadline && S.boss.resolved !== 'pendingConfirmation') {
    S.boss.resolved = 'pendingConfirmation';
    S.log.unshift({ id: `${now}-bossexpire`, ts: now, type: 'gain',
      text: `BOSS DEADLINE PASSED: "${S.boss.name}". Awaiting completion confirmation in the Arena.` });
    changed = true;
  }

  // Focus timer completion — check whether the running timer has elapsed
  if (S.focusTimer && S.focusTimer.running && S.focusTimer.endsAt && now >= S.focusTimer.endsAt) {
    const mins = S.focusTimer.durationMins;
    if (isBreakDuration(mins)) {
      // Break Timer — no XP, no credits, no boss damage, no stat changes at all.
      S.focusTimer = { running: false, endsAt: 0, durationMins: mins, startedAt: 0 };
      S.log.unshift({ id: `${now}-break`, ts: now, type: 'gain',
        text: `Break complete · ${mins} min · time to refocus` });
      showFocusComplete(mins, 0, true);
    } else {
      // Deep work — XP scales 1:1 with minutes
      const baseXp = Math.max(5, mins);
      const gained = awardXp(baseXp, 'resolve');
      // Credits already awarded by awardXp (mirrors XP)
      S.focusTimer = { running: false, endsAt: 0, durationMins: mins, startedAt: 0 };
      S.log.unshift({ id: `${now}-focus`, ts: now, type: 'gain',
        text: `Focus block complete · ${mins} min · +${gained} XP · +${gained} credits` });
      showFocusComplete(mins, gained, false);
    }
    changed = true;
  }

  if (damage > 0) {
    const prev = S.hp;
    S.hp = Math.max(0, S.hp - damage);
    triggerShake();
    if (S.hp <= 0 && prev > 0) {
      showDeath();
    }
    changed = true;
  }
  S.log = S.log.slice(0, 200);
  if (changed) { persist(); render(); }
}

      btn.style.background = sel ? 'rgba(74,144,194,0.14)' : 'rgba(255,255,255,0.03)';

    const name = inp.value;
    let deadlineTs = null;
    if (dlInp && dlInp.value) {

      if (!isNaN(t)) deadlineTs = t;
    }
    setBoss(name, deadlineTs);
    closeModal();
  };

  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter') submit();
  });
  setTimeout(() => inp.focus(), 50);

window.bwSync = function(v) {
  const num = parseFloat(v);
  if (!isFinite(num)) return;
  const clamped = Math.max(20, Math.min(250, Math.round(num * 2) / 2));
  const slider = document.getElementById('bw-slider');
  const inp = document.getElementById('bw-num');
  if (slider && slider !== document.activeElement) slider.value = clamped;
  if (inp && inp !== document.activeElement) inp.value = clamped;
};
window.saveBodyweight = function() {
  const v = parseFloat(document.getElementById('bw-num').value);
  if (isFinite(v) && v >= 20 && v <= 250) {
    S.bodyweight = Math.round(v * 2) / 2;
    persist();
  }
  closeModal();
};

  const sleep = Array.isArray(S.sleep) ? S.sleep.length : 0;
  const sessions = Array.isArray(S.sessions) ? S.sessions.length : 0;
  const journal = (S.journal && Array.isArray(S.journal.entries)) ? S.journal.entries.length : 0;
  const totalLv = calcTotalLevel(S.pillars);
  return `LV ${totalLv} · ${habits} habits · ${sessions} sessions · ${sleep} sleep · ${journal} journal`;
}

window.backupData = function() {
  const btn = document.getElementById('backup-btn');
  const msg = document.getElementById('backup-msg');
  try {
    const data = JSON.stringify(S);
    const finalize = (label, success) => {
      if (msg) {
        msg.textContent = label;
        msg.style.color = success ? 'rgba(122,177,122,0.95)' : 'rgba(229,184,114,0.95)';
      }
    };
    // Try modern clipboard API first; fall back to textarea trick
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(data).then(
        () => finalize(`Copied · ${data.length.toLocaleString()} chars`, true),
        () => fallbackCopy(data, finalize)
      );
    } else {
      fallbackCopy(data, finalize);
    }
  } catch (e) {
    if (msg) {
      msg.textContent = 'Backup failed: ' + (e && e.message || e);
      msg.style.color = 'rgba(217,83,79,0.95)';
    }
  }
};

function fallbackCopy(text, done) {
  try {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    const ok = document.execCommand('copy');
    document.body.removeChild(ta);
    done(ok ? `Copied · ${text.length.toLocaleString()} chars` : 'Copy failed — long-press the textarea below', ok);
    if (!ok) {
      // As a last resort, drop the text into the restore textarea so user can manually copy it
      const restore = document.getElementById('restore-text');
      if (restore) {
        restore.value = text;
        restore.placeholder = 'Long-press to select all and copy this text';
      }
    }
  } catch (e) {
    done('Copy failed: ' + (e && e.message || e), false);
  }
}

window.restoreData = function() {
  const ta = document.getElementById('restore-text');
  const msg = document.getElementById('restore-msg');
  if (!ta) return;
  const txt = (ta.value || '').trim();
  if (!txt) {
    if (msg) msg.textContent = 'Paste backup data first.';
    return;
  }
  let parsed;
  try {
    parsed = JSON.parse(txt);
  } catch (e) {
    if (msg) {
      msg.textContent = 'Invalid JSON. Make sure you pasted the entire backup.';
      msg.style.color = 'rgba(217,83,79,0.95)';
    }
    return;
  }
  if (!parsed || typeof parsed !== 'object') {
    if (msg) {
      msg.textContent = 'Backup data is not a valid object.';
      msg.style.color = 'rgba(217,83,79,0.95)';
    }
    return;
  }
  // Sanity check: at minimum should have pillars or habits to look like Foundry data
  if (!parsed.pillars && !parsed.habits) {
    if (msg) {
      msg.textContent = 'This doesn\'t look like Foundry backup data.';
      msg.style.color = 'rgba(217,83,79,0.95)';
    }
    return;
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed));
    if (msg) {
      msg.textContent = 'Restored. Reloading...';
      msg.style.color = 'rgba(122,177,122,0.95)';
    }
    setTimeout(() => { location.reload(); }, 600);
  } catch (e) {
    if (msg) {
      msg.textContent = 'Restore failed: ' + (e && e.message || e);
      msg.style.color = 'rgba(217,83,79,0.95)';
    }
  }
};

function ringHTML(value, max, color, opts = {}) {
  const size = opts.size || 110;
  const stroke = opts.stroke || 9;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  const id = `rg-${color.replace('#','')}-${size}-${Math.random().toString(36).slice(2,5)}`;
  return `
    <div class="ring-wrap" style="width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}">
        <defs>
          <linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.95"/>
          </linearGradient>
        </defs>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${stroke}"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c * (1 - pct)}"/>
      </svg>
      <div class="ring-label">
        <div class="ring-sub">${opts.sublabel || ''}</div>
        <div class="ring-val">${opts.label != null ? opts.label : value}</div>
      </div>
    </div>`;
}

function statBarHTML(value, max, color, h = 6) {
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return `<div class="statbar" style="height:${h}px"><div style="width:${pct}%;background:${color}"></div></div>`;
}

function sparklineHTML(data, color, opts = {}) {
  if (!data || data.length === 0) return '';
  const w = opts.width || 100;
  const h = opts.height || 28;
  if (data.length === 1) data = [data[0], data[0]];
  const min = Math.min(...data, 0);
  const max = Math.max(...data, 1);
  const range = max - min || 1;
  const path = data.map((v,i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${i===0?'M':'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  const fill = opts.fill !== false;
  const id = `sp-${color.replace('#','')}-${Math.random().toString(36).slice(2,6)}`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto" preserveAspectRatio="none">
      ${fill?`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${path} L ${w} ${h} L 0 ${h} Z" fill="url(#${id})"/>`:''}
      <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
}

function startFocusTimer(mins) {
  if (S.focusTimer.running) return;
  mins = parseInt(mins) || 25;
  mins = Math.max(1, Math.min(180, mins));
  const now = Date.now();
  S.focusTimer = {
    running: true,
    endsAt: now + mins * 60000,
    durationMins: mins,
    startedAt: now,
  };
  persist(); render();
}
function cancelFocusTimer() {
  S.focusTimer = { running: false, endsAt: 0, durationMins: S.focusTimer.durationMins || 25, startedAt: 0 };
  persist(); render();
}
function showFocusComplete(mins, xp, isBreak) {
  // Determine messaging — breaks get a softer, neutral palette
  const accent = isBreak ? 'rgba(122,177,122,0.85)' : 'rgba(123,111,176,0.85)';
  const label = isBreak ? 'Break complete' : 'Focus complete';
  const sub = isBreak
    ? `Take a breath — back to it when ready`
    : `+${xp} Resolve XP · +${xp} Credits`;
  showOverlay(`
    <div class="fs-overlay">
      <div class="fs-content">
        <div style="margin-bottom:12px;color:${accent}">${icon('clock', 56)}</div>
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.32em;color:${accent};margin-bottom:4px">${label}</div>
        <div style="font-size:30px;font-weight:600;color:rgba(255,255,255,0.95);margin-bottom:4px">${mins} minutes</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.65)">${sub}</div>
      </div>
    </div>`, 2400);
}

function renderFocus() {
  const t = S.focusTimer;
  const now = Date.now();
  const running = t.running && t.endsAt > now;
  const totalMs = (t.durationMins || 25) * 60000;
  const remainingMs = running ? Math.max(0, t.endsAt - now) : totalMs;
  const remainingSec = Math.floor(remainingMs / 1000);
  const mm = Math.floor(remainingSec / 60);
  const ss = remainingSec % 60;
  const timeStr = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  const pct = running ? 1 - (remainingMs / totalMs) : 0;
  const inBreakMode = isBreakDuration(t.durationMins);

  // Colors swap based on mode: Resolve indigo for Deep Work, soft green for Break
  const accentColor = inBreakMode ? '#7AB17A' : '#7B6FB0';

  const breakPresets = FOCUS_DURATIONS.filter(d => isBreakDuration(d.mins));

  return `

          <h2 class="section-title">Focus</h2>
        </div>
        ${running ? `<span style="font-size:10px;text-transform:uppercase;letter-spacing:0.16em;color:${accentColor};font-weight:600">${inBreakMode ? 'On break' : 'Locked in'}</span>` : ''}
      </div>

      <div style="display:flex;flex-direction:column;align-items:center;padding:4px 0 18px">
        <div class="ring-wrap" style="width:${size}px;height:${size}px">
          <svg width="${size}" height="${size}">
            <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${stroke}"/>
            <circle id="focus-ring" cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${accentColor}" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${offset}" style="transition:stroke-dashoffset 1s linear"/>
          </svg>
          <div class="ring-label">
            <div style="font-size:42px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.95);letter-spacing:-0.02em" id="focus-time">${timeStr}</div>
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.22em;color:rgba(255,255,255,0.45);margin-top:4px">${t.durationMins} min · ${modeLabel}</div>
          </div>
        </div>
      </div>

      ${running ? `
        <button onclick="cancelFocusTimer()" style="width:100%;height:44px;border-radius:999px;background:rgba(217,83,79,0.12);border:1px solid rgba(217,83,79,0.4);color:#E07975;font-size:13px;font-weight:600">
          ${inBreakMode ? 'End break early' : 'Abandon · no XP'}
        </button>
      ` : `
        <!-- Break presets -->
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(122,177,122,0.85);font-weight:600">Break</span>
          <span style="font-size:9px;color:rgba(255,255,255,0.4)">No XP · no penalties</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(${breakPresets.length},1fr);gap:6px;margin-bottom:14px">
          ${breakPresets.map(d => `
            <button onclick="startFocusTimer(${d.mins})" style="height:44px;border-radius:12px;background:rgba(122,177,122,0.08);border:1px solid rgba(122,177,122,0.30);color:#7AB17A;font-size:13px;font-weight:600">
              ${d.label}
            </button>
          `).join('')}
        </div>

        <!-- Deep Work presets -->
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
          <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(123,111,176,0.85);font-weight:600">Deep work</span>
          <span style="font-size:9px;color:rgba(255,255,255,0.4)">1 XP &amp; 1 credit per min</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(${workPresets.length},1fr);gap:6px;margin-bottom:14px">
          ${workPresets.map(d => `

        </div>

          ≤ ${BREAK_THRESHOLD_MINS} min = Break (no rewards). Longer = Deep work (rewards on completion).<br>Abandoning early yields nothing.
        </div>
      `}
    </div>
  `;
}

// Tick the timer display every second when the Focus tab is visible
let _focusInterval = null;
function startFocusUpdater() {
  if (_focusInterval) return;
  _focusInterval = setInterval(() => {
    if (UI.tab !== 'focus') return;
    if (!S.focusTimer.running) return;
    const now = Date.now();
    if (now >= S.focusTimer.endsAt) {
      decayTick(); // will trigger completion
      return;
    }
    const remainingMs = Math.max(0, S.focusTimer.endsAt - now);
    const remainingSec = Math.floor(remainingMs / 1000);
    const mm = Math.floor(remainingSec / 60);
    const ss = remainingSec % 60;
    const timeStr = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    const timeEl = document.getElementById('focus-time');
    if (timeEl) timeEl.textContent = timeStr;
    const ringEl = document.getElementById('focus-ring');
    if (ringEl) {
      const totalMs = S.focusTimer.durationMins * 60000;
      const pct = 1 - (remainingMs / totalMs);
      const c = 2 * Math.PI * ((240 - 14) / 2);
      ringEl.setAttribute('stroke-dashoffset', String(c * (1 - pct)));
    }
  }, 1000);
}

function buyArmoryItem(id) {
  // Find item (default or custom)
  const item = DEFAULT_ARMORY.find(x => x.id === id) || S.armory.find(x => x.id === id);
  if (!item) return;
  if ((S.credits || 0) < item.price) {
    spawnFloat('Not enough credits', '#D9534F');
    return;
  }
  S.credits = (S.credits || 0) - item.price;
  S.armoryPurchases.unshift({ ts: Date.now(), name: item.name, price: item.price });
  S.armoryPurchases = S.armoryPurchases.slice(0, 50);
  const now = Date.now();

  if (item.kind === 'shield' || item.shield) {
    S.shieldActiveUntil = Math.max(now, S.shieldActiveUntil || 0) + 24 * 3600000;
    spawnFloat('Tactical Shield · 24h', '#4A90C2');
  } else if (item.kind === 'stimpack') {
    const beforeHp = S.hp;
    S.hp = Math.min(maxHp(), S.hp + 30);
    const healed = S.hp - beforeHp;
    spawnFloat(`+${healed} HP · Stimpack`, '#D9534F');
  } else if (item.kind === 'xpscroll') {
    S.xpBuffUntil = Math.max(now, S.xpBuffUntil || 0) + 4 * 3600000;
    spawnFloat('XP Scroll · 1.5× · 4h', '#E5B872');
  } else {
    spawnFloat(`Redeemed: ${item.name}`, '#7AB17A');
  }
  S.log.unshift({ id: `${Date.now()}-buy`, ts: Date.now(), type: 'gain',
    text: `Armory: redeemed "${item.name}" (−${item.price} credits)` });
  S.log = S.log.slice(0, 200);
  persist();
  render();
}

async function hashPin(pin) {
  try {
    const enc = new TextEncoder().encode(String(pin));
    const buf = await crypto.subtle.digest('SHA-256', enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  } catch {
    // Fallback simple hash if subtle.crypto unavailable
    let h = 0;
    String(pin).split('').forEach(c => { h = ((h << 5) - h) + c.charCodeAt(0); h |= 0; });
    return String(h);
  }
}

// Deduct XP from a pillar without going below current-level minimum.
// Levels are never lost; only progress toward the next level is. Lifetime XP
// is unaffected (it's "lifetime earned"). Credits already in your balance
// are also not clawed back.
function deductXp(amount, pillarKey) {
  if (!PILLARS[pillarKey]) pillarKey = 'resolve';
  amount = Math.max(0, parseInt(amount) || 0);
  if (amount === 0) return 0;
  const p = S.pillars[pillarKey] || { level: 1, xp: 0 };
  const actual = Math.min(p.xp, amount);
  p.xp = Math.max(0, p.xp - amount);
  S.pillars[pillarKey] = p;
  return actual;
}

// Vice tier penalty matrix
const VICE_TIERS = {
  minor:    { label: 'Minor',    hp: 5,  xp: 10, discMisses: 1, color: '#C99664', bg: 'rgba(201,150,100,0.12)', border: 'rgba(201,150,100,0.35)' },
  major:    { label: 'Major',    hp: 15, xp: 25, discMisses: 1, color: '#D9534F', bg: 'rgba(217,83,79,0.12)',  border: 'rgba(217,83,79,0.35)' },
  critical: { label: 'Critical', hp: 30, xp: 50, discMisses: 3, color: '#B22222', bg: 'rgba(178,34,34,0.18)',  border: 'rgba(178,34,34,0.5)' },
};

function addVice(name, tier) {
  name = (name || '').trim();
  if (!name) return;
  if (S.vices.length >= 50) return;
  if (!VICE_TIERS[tier]) tier = 'major';
  S.vices.unshift({
    id: `v-${Date.now()}${Math.random().toString(36).slice(2,5)}`,
    name,
    tier,
    createdAt: Date.now(),
    totalSlips: 0,
    lastSlip: 0,
  });
  persist(); render();
}

function removeVice(id) {
  S.vices = S.vices.filter(v => v.id !== id);
  persist(); render();
}

function slipVice(id) {
  const v = S.vices.find(x => x.id === id);
  if (!v) return;
  const now = Date.now();
  const shielded = shieldActive();
  const tier = VICE_TIERS[v.tier] || VICE_TIERS.major;

  // Resolve XP penalty ALWAYS applies (even with shield active)
  const xpDeducted = deductXp(tier.xp, 'resolve');
  spawnFloat(`−${xpDeducted} Resolve XP`, tier.color);

  // HP and discipline penalties only apply if shield is NOT active
  let hpDmg = 0;
  if (!shielded) {
    hpDmg = tier.hp;
    const prevHp = S.hp;
    S.hp = Math.max(0, S.hp - hpDmg);
    triggerShake();
    // Heavier tiers stamp multiple discipline misses so the bar drops more
    for (let i = 0; i < tier.discMisses; i++) {
      S.disciplineEvents.push({ ts: now + i, type: 'miss', source: 'vice', viceId: id });
    }
    if (S.hp <= 0 && prevHp > 0) showDeath();
  }

  v.totalSlips = (v.totalSlips || 0) + 1;
  v.lastSlip = now;

  S.log.unshift({
    id: `${now}-vice-${id}`,
    ts: now,
    type: shielded ? 'gain' : 'miss',
    text: shielded
      ? `${tier.label} slip: "${v.name}" — shield absorbed HP/discipline. −${xpDeducted} Resolve XP.`
      : `${tier.label} slip: "${v.name}" — −${hpDmg} HP · −${xpDeducted} Resolve XP · discipline hit.`,
  });
  S.log = S.log.slice(0, 200);

  persist(); render();
}

async function trySetJournalPin(pin) {
  if (!/^\d{6}$/.test(String(pin))) {
    return { ok: false, msg: 'PIN must be exactly 6 digits.' };
  }
  S.journal.pinHash = await hashPin(pin);
  S.journal.lastUnlock = Date.now();
  persist();
  return { ok: true };
}

async function tryUnlockJournal(pin) {
  if (!S.journal.pinHash) return { ok: false, msg: 'No PIN set.' };
  const h = await hashPin(pin);
  if (h === S.journal.pinHash) {
    S.journal.lastUnlock = Date.now();
    persist();
    return { ok: true };
  }
  return { ok: false, msg: 'Wrong PIN.' };
}

  // Stay unlocked for 5 minutes after a correct PIN
  return S.journal.lastUnlock && (Date.now() - S.journal.lastUnlock < 5 * 60000);
}

function renderSleepCard(todaySleep) {
  // 7-day sparkline
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i*86400000);
    const e = S.sleep.find(s => s.date === dayKey(d));
    last7.push(e?.hours || 0);
  }
  return `
    <div class="glass p-4" data-card="sleep">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <button onclick="openModal('sleep-history')" style="display:flex;align-items:center;gap:6px;background:none;border:none;padding:0;color:inherit;cursor:pointer">
          <span style="color:rgba(255,255,255,0.7)">${icon('moon', 14)}</span>
          <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.9)">Sleep</span>
          <span style="color:rgba(255,255,255,0.35);margin-left:2px">${icon('chev', 11)}</span>
        </button>
        <button onclick="toggleSleepEditor()" id="sleep-toggle" style="font-size:10px;color:rgba(255,255,255,0.55);background:none;border:none">Log</button>
      </div>
      <div id="sleep-display" onclick="if(event.target===this||event.target.closest('[data-history]'))openModal('sleep-history')">
        ${todaySleep ? `
          <div style="font-size:24px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.95)" data-history>
            ${todaySleep.hours}<span style="font-size:14px;color:rgba(255,255,255,0.45);margin-left:2px">h</span>
          </div>
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:8px" data-history>Quality ${todaySleep.quality}/5</div>
        ` : `
          <div style="font-size:24px;font-weight:600;color:rgba(255,255,255,0.3);margin-bottom:8px" data-history>—</div>
        `}
        <div style="height:28px" data-history>${sparklineHTML(last7, '#7B6FB0', { height: 28 })}</div>
        <div style="font-size:9px;color:rgba(255,255,255,0.35);font-variant-numeric:tabular-nums;letter-spacing:0.06em;margin-top:2px" data-history>7d</div>
      </div>
      <div id="sleep-editor" style="display:none">
        <div style="margin-bottom:8px">
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:4px">Hours: <span id="sleep-hours-val">${todaySleep?.hours || 7}</span></div>
          <input type="range" min="0" max="12" step="0.5" value="${todaySleep?.hours || 7}" id="sleep-hours" oninput="document.getElementById('sleep-hours-val').textContent=this.value" />
        </div>
        <div style="margin-bottom:8px">
          <div style="font-size:10px;color:rgba(255,255,255,0.45);margin-bottom:4px">Quality</div>
          <div style="display:flex;gap:4px" id="sleep-q" data-selected="${todaySleep?.quality || 3}">
            ${[1,2,3,4,5].map(n => `
              <button data-q="${n}" class="sleep-q-btn" onclick="selectSleepQ(${n})" style="flex:1;height:28px;border-radius:6px;font-size:11px;font-weight:500;border:none;background:${(todaySleep?.quality||3)>=n?'#7B6FB0':'rgba(255,255,255,0.05)'};color:${(todaySleep?.quality||3)>=n?'#fff':'rgba(255,255,255,0.5)'}">${n}</button>
            `).join('')}
          </div>
        </div>
        <button onclick="saveSleep()" style="width:100%;height:28px;border-radius:999px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.95);color:rgba(0,0,0,0.9);border:none">Save</button>

}
window.toggleSleepEditor = function() {
  const d = document.getElementById('sleep-display');
  const e = document.getElementById('sleep-editor');
  const t = document.getElementById('sleep-toggle');
  const editing = e.style.display === 'block';
  e.style.display = editing ? 'none' : 'block';
  d.style.display = editing ? 'block' : 'none';
  t.textContent = editing ? 'Log' : 'Cancel';
};
window.selectSleepQ = function(n) {
  const container = document.getElementById('sleep-q');
  container.dataset.selected = String(n);
  container.querySelectorAll('.sleep-q-btn').forEach(b => {
    const bn = parseInt(b.dataset.q);
    b.style.background = n >= bn ? '#7B6FB0' : 'rgba(255,255,255,0.05)';
    b.style.color = n >= bn ? '#fff' : 'rgba(255,255,255,0.5)';
  });
};
window.saveSleep = function() {
  const h = parseFloat(document.getElementById('sleep-hours').value);
  const q = parseInt(document.getElementById('sleep-q').dataset.selected) || 3;
  logSleep(h, q);

function renderNetWorth() {
  const nw = S.netWorth;
  const prev = nw.history.length > 1 ? nw.history[nw.history.length - 2].value : nw.value;
  const delta = nw.value - prev;
  const trendColor = delta > 0 ? '#7AB17A' : delta < 0 ? '#D9534F' : '#888';
  const trendIcon = delta > 0 ? 'up' : delta < 0 ? 'down' : 'minus';
  const check = canUpdateNetWorth();
  const locked = !check.ok;

  return `
    <div class="glass p-5" data-card="netw">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <button onclick="openModal('networth-history')" style="display:flex;align-items:center;gap:8px;background:none;border:none;padding:0;color:inherit;cursor:pointer">
          <span style="color:rgba(255,255,255,0.55)">${icon('wallet', 16)}</span>
          <h2 class="section-title">Net Worth</h2>
          <span style="color:rgba(255,255,255,0.35);margin-left:2px">${icon('chev', 13)}</span>
        </button>
        <button onclick="toggleNetWorth()" id="nw-toggle" ${locked?'disabled':''} style="font-size:11px;color:${locked?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.55)'};background:none;border:none;${locked?'cursor:not-allowed':''}">${locked?`${check.daysLeft}d locked`:'Update'}</button>
      </div>
      <div id="nw-display">
        <div style="display:flex;align-items:flex-end;justify-content:space-between">
          <div>
            <div style="font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.95)">$${nw.value.toLocaleString()}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:4px;font-size:12px;color:${trendColor}">
              ${icon(trendIcon, 12)}
              <span style="font-variant-numeric:tabular-nums">${delta > 0?'+':''}${delta.toLocaleString()} since last</span>
            </div>
          </div>
          ${nw.history.length > 1 ? `<div style="width:80px;height:28px">${sparklineHTML(nw.history.map(p => p.value), trendColor, { fill: false, height: 28, width: 80 })}</div>` : ''}
        </div>
        <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:8px;letter-spacing:0.06em">
          ${locked ? `Next update available in ${check.daysLeft} day${check.daysLeft!==1?'s':''}` : nw.lastUpdate ? `Last updated ${new Date(nw.lastUpdate).toLocaleDateString([], {month:'short',day:'numeric'})} · monthly cadence` : 'Updates allowed once every 30 days'}
        </div>
      </div>
      <div id="nw-editor" style="display:none">
        <div style="display:flex;gap:8px">
          <input type="number" id="nw-input" value="${nw.value}" style="flex:1" />
          <button onclick="saveNetWorth()" style="padding:0 16px;border-radius:12px;background:rgba(255,255,255,0.95);color:rgba(0,0,0,0.9);border:none;font-weight:600;font-size:14px">Save</button>
        </div>
        <div style="font-size:10px;color:rgba(229,184,114,0.85);margin-top:8px;text-align:center">Once saved, locked for 30 days.</div>
      </div>
    </div>`;
}
window.toggleNetWorth = function() {
  if (!canUpdateNetWorth().ok) return;
  const d = document.getElementById('nw-display');
  const e = document.getElementById('nw-editor');
  const t = document.getElementById('nw-toggle');
  const editing = e.style.display === 'block';
  e.style.display = editing ? 'none' : 'block';
  d.style.display = editing ? 'block' : 'none';
  t.textContent = editing ? 'Update' : 'Cancel';
  if (!editing) setTimeout(() => document.getElementById('nw-input').focus(), 50);
};
window.saveNetWorth = function() {
  const n = parseFloat(document.getElementById('nw-input').value) || 0;
  updateNetWorth(n);
};

function renderQuests() {
  const todayDue = S.habits.filter(habitDueToday);
  const todayDone = S.habits.length - todayDue.length;
  const base = UI.questView === 'today' ? todayDue : S.habits;
  const filtered = UI.questFilter === 'all' ? base : base.filter(h => h.pillar === UI.questFilter);

  const chipBase = (active, color, label, action) => {
    const c = color || '#FFFFFF';
    return `<button onclick="${action}" style="
      flex-shrink:0;padding:6px 12px;border-radius:999px;
      background:${active?c+'1F':'rgba(255,255,255,0.03)'};
      border:1px solid ${active?c+'55':'rgba(255,255,255,0.07)'};
      color:${active?(c==='#FFFFFF'?'#fff':c):'rgba(255,255,255,0.6)'};
      font-size:12px;font-weight:500;
    ">${label}</button>`;
  };

  return `
    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 class="section-title">Quests</h2>
        <button class="btn" onclick="openModal('habit')">${icon('plus', 13)} Add</button>
      </div>

      <div class="seg-bar">
        <button class="${UI.questView==='all'?'active':''}" onclick="setQuestView('all')">All · ${S.habits.length}</button>
        <button class="${UI.questView==='today'?'active':''}" onclick="setQuestView('today')">Today · ${todayDue.length}</button>
      </div>

      ${UI.questView === 'today' ? `
        <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:12px;display:flex;align-items:center;gap:8px">
          ${icon('activity', 11)} <span>${todayDone} of ${S.habits.length} complete today${todayDone===S.habits.length && S.habits.length>0?' · Perfect Day ⭐':''}</span>
        </div>
      ` : ''}

      <div class="chip-scroll" style="margin-bottom:16px">
        ${chipBase(UI.questFilter === 'all', null, 'All', "setQuestFilter('all')")}
        ${Object.entries(PILLARS).map(([k,p]) => {
          const ct = base.filter(h => h.pillar === k).length;
          return chipBase(UI.questFilter === k, p.color, `${p.label} · ${ct}`, `setQuestFilter('${k}')`);
        }).join('')}
      </div>

      ${filtered.length === 0 ? `
        <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.35);font-size:14px">
          ${UI.questView === 'today' ? 'Nothing due. Rest earned.' : 'No quests yet. Add one to begin.'}
        </div>
      ` : filtered.map(h => habitRowHTML(h)).join('')}

      <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:16px;text-align:center;letter-spacing:0.06em">
        ${S.habits.length} / 100 habits

/* ============================================================
   MUSCLE MAP — visual body diagram + recovery tracking
   ============================================================ */
// Compute recovery state for a muscle group based on last hit timestamp.
// ============================================================
// RECOVERY MODEL
// Each session deposits a "fatigue load" on the muscle. That load decays
// exponentially with a half-life calibrated per muscle group. The current
// fatigue level is the sum of all decayed deposits at this moment.
//
//   fatigue(now) = Σ load_i × 0.5^((now - ts_i) / halfLife)
//
// We then express it as a 0-100% number relative to a "max useful" deposit,
// which is one full optimal session for that muscle group. The current
// fatigue % drives the cycle phase shown to the user.
// ============================================================

// Rough "fully fatigued from one session" value — calibration constant.
// In practice this varies, but provides a stable normaliser.
const FATIGUE_REF_LOAD = 2000; // matches a solid hypertrophy session

function muscleFatigue(muscleKey) {
  const hits = (S.muscleHits && S.muscleHits[muscleKey]) || [];
  if (hits.length === 0) return 0;
  const prof = profileFor(muscleKey);
  const halfLife = prof.halfLifeHours;
  const now = Date.now();
  let fatigue = 0;
  hits.forEach(h => {
    const load = h.load || 100; // legacy hits without load field count as small deposit
    const hoursAgo = (now - h.ts) / 3600000;
    if (hoursAgo < 0) return;
    // Skip ancient hits — beyond 6 half-lives the decay is negligible
    if (hoursAgo > halfLife * 6) return;
    const decay = Math.pow(0.5, hoursAgo / halfLife);
    fatigue += load * decay;
  });
  return fatigue;
}

// Convert raw fatigue into a 0-1 ratio against the reference load
function muscleFatigueRatio(muscleKey) {
  return Math.min(2, muscleFatigue(muscleKey) / FATIGUE_REF_LOAD);
}

// Cycle phase: Spent → Loading → Primed → Stale → Untrained
// Uses fatigue ratio + time since last hit.
function muscleRecoveryState(muscleKey) {
  const hits = (S.muscleHits && S.muscleHits[muscleKey]) || [];
  if (hits.length === 0) {
    return { stage: 'untrained', fatigue: 0, hoursAgo: Infinity, lastTs: 0,
             color: 'rgba(255,255,255,0.06)', label: 'Untrained' };
  }
  const lastTs = hits[hits.length - 1].ts;
  const hoursAgo = (Date.now() - lastTs) / 3600000;
  const fatigue = muscleFatigue(muscleKey);
  const ratio = fatigue / FATIGUE_REF_LOAD;

  // Stale: no work in 10+ days = detraining territory
  if (hoursAgo > 240) {
    return { stage: 'stale', fatigue, ratio, hoursAgo, lastTs,
             color: 'rgba(255,255,255,0.18)', label: 'Stale' };
  }

  // Cycle phases by fatigue ratio
  if (ratio >= 0.70) {
    return { stage: 'spent', fatigue, ratio, hoursAgo, lastTs,
             color: '#D9534F', label: 'Spent' };
  }
  if (ratio >= 0.30) {
    return { stage: 'loading', fatigue, ratio, hoursAgo, lastTs,
             color: '#E5B872', label: 'Loading' };
  }
  return { stage: 'primed', fatigue, ratio, hoursAgo, lastTs,
           color: '#7AB17A', label: 'Primed' };
}

// Weekly frequency tracker — how many sessions hit this muscle in the last 7 days?
// Returns { hits, target, ratio } where ratio > 1 means over-target.
function muscleWeeklyFrequency(muscleKey) {
  const cutoff = Date.now() - 7 * 86400000;
  const hits = (S.muscleHits && S.muscleHits[muscleKey]) || [];
  // Dedupe by session (a muscle hit twice in the same session counts as one hit)
  const sessions = new Set();
  hits.forEach(h => {
    if (h.ts >= cutoff && h.sessionId) sessions.add(h.sessionId);
  });
  const count = sessions.size;
  const target = profileFor(muscleKey).weeklyTarget;
  return { hits: count, target, ratio: count / target };
}

// Frequency status label / color
function muscleFrequencyStatus(muscleKey) {
  const f = muscleWeeklyFrequency(muscleKey);
  if (f.hits === 0) return { ...f, status: 'idle',    color: 'rgba(255,255,255,0.4)',  label: 'Idle' };
  if (f.ratio < 0.5)  return { ...f, status: 'low',     color: '#E5B872',                label: 'Under' };
  if (f.ratio <= 1.2) return { ...f, status: 'ontarget', color: '#7AB17A',                label: 'On target' };
  return                { ...f, status: 'over',     color: '#D9534F',                label: 'Over' };
}

// Imbalance check: push vs pull, quad vs hamstring, left/right (not applicable here).
// Returns array of warnings with { kind, severity, message }.
function detectImbalances() {
  const warnings = [];
  const vol = muscleVolumeLast30();
  const push = (vol.chest || 0) + (vol.upperChest || 0) + (vol.lowerChest || 0)
             + (vol.frontDelts || 0) + (vol.sideDelts || 0) + (vol.triceps || 0);
  const pull = (vol.back || 0) + (vol.lats || 0) + (vol.traps || 0)
             + (vol.lowerBack || 0) + (vol.rearDelts || 0) + (vol.biceps || 0);
  if (push > 100 && pull > 0) {
    const ratio = push / pull;
    if (ratio > 1.4) {
      warnings.push({ kind: 'push-pull', severity: 'warn',
        message: `Push volume is ${ratio.toFixed(1)}× pull. Add rows or pulls.` });
    } else if (ratio < 0.7) {
      warnings.push({ kind: 'push-pull', severity: 'warn',
        message: `Pull volume is ${(1/ratio).toFixed(1)}× push. Add pressing.` });
    }
  }
  const quads = vol.quads || 0;
  const hams = vol.hamstrings || 0;
  if (quads > 200 && hams > 0 && quads / hams > 2) {
    warnings.push({ kind: 'quad-ham', severity: 'warn',
      message: `Quads ${(quads/hams).toFixed(1)}× hamstrings. Add hinges/curls.` });
  }
  return warnings;
}

// Which muscles are Primed AND under their weekly target?
// Suggestion order: most under-target first.
function muscleTrainSuggestions() {
  const list = [];
  Object.keys(MUSCLE_GROUPS).forEach(k => {
    // Skip subdivisions — only suggest top-level parent groups
    if (MUSCLE_GROUPS[k].parent) return;
    const rec = muscleRecoveryState(k);
    if (rec.stage !== 'primed' && rec.stage !== 'untrained' && rec.stage !== 'stale') return;
    const freq = muscleWeeklyFrequency(k);
    if (freq.ratio >= 1) return; // already on/over target
    list.push({
      muscle: k,
      label: MUSCLE_GROUPS[k].label,
      hits: freq.hits,
      target: freq.target,
      stage: rec.stage,
      deficit: freq.target - freq.hits,
    });
  });
  list.sort((a, b) => b.deficit - a.deficit);
  return list.slice(0, 5);
}

// Last-30-day "strength" leaderboard — total effective volume per muscle
function muscleVolumeLast30() {
  const cutoff = Date.now() - 30 * 86400000;
  const tally = {};
  Object.keys(MUSCLE_GROUPS).forEach(k => tally[k] = 0);
  S.sessions.forEach(s => {
    if (s.ts < cutoff) return;
    const routine = S.routines.find(r => r.id === s.routineId);
    if (!routine) return;
    Object.entries(s.exercises || {}).forEach(([exId, sets]) => {
      const ex = routine.exercises.find(e => e.id === exId);
      if (!ex || !Array.isArray(ex.muscles)) return;
      const exVol = sets.reduce((sum, set) => sum + (set.reps||0) * effectiveLoad(ex, set.weight), 0);
      // Divide volume evenly across the muscles trained (so a 3-muscle compound counts each at 1/3)
      const portion = exVol / ex.muscles.length;
      ex.muscles.forEach(m => {
        if (tally[m] !== undefined) tally[m] += portion;
      });
    });
  });
  return tally;
}

// Format relative time for display (e.g. "2h ago", "3d ago")
function formatRelative(ts) {
  const sec = Math.max(0, (Date.now() - ts) / 1000);
  if (sec < 60) return 'just now';
  if (sec < 3600) return `${Math.floor(sec/60)}m ago`;
  if (sec < 86400) return `${Math.floor(sec/3600)}h ago`;
  const days = Math.floor(sec / 86400);
  if (days < 30) return `${days}d ago`;
  return `${Math.floor(days/30)}mo ago`;
}

function renderGym() {
  if (UI.gymView.kind === 'detail') return renderRoutineDetail(UI.gymView.id);
  if (UI.gymView.kind === 'log') return renderSessionLogger(UI.gymView.id);

  // Volume chart — uses effective load so bodyweight tonnage shows up properly
  const last7Vol = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i*86400000);
    const k = dayKey(d);
    const vol = S.sessions.filter(s => dayKey(new Date(s.ts)) === k).reduce((sum, s) => {
      const routine = S.routines.find(r => r.id === s.routineId);
      let v = 0;
      Object.entries(s.exercises || {}).forEach(([exId, sets]) => {
        const ex = routine?.exercises.find(e => e.id === exId);
        sets.forEach(set => v += (set.reps||0) * effectiveLoad(ex, set.weight));
      });
      return sum + v;
    }, 0);
    last7Vol.push(vol);
  }
  const totalWeek = last7Vol.reduce((a,b) => a+b, 0);
  const sessionsWeek = S.sessions.filter(s => Date.now() - s.ts < 7*86400000).length;
  const prCount = Object.keys(S.prs).length;
  const max = Math.max(...last7Vol, 1);

  return `
    ${renderMuscleMapWidget()}
    <div class="glass p-5" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">

            return `
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">

                <div class="vol-bar" style="height:${Math.max(2,h)}%;width:100%;background:${v===0?'rgba(255,255,255,0.05)':isToday?'#D9534F':'rgba(217,83,79,0.5)'}"></div>
              </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-top:4px">
          ${['6d','5d','4d','3d','2d','1d','Today'].map(l => `<div style="flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.35);font-variant-numeric:tabular-nums">${l}</div>`).join('')}
        </div>
      </div>
      <div class="grid-3" style="margin-top:16px">
        ${[['This week', Math.round(totalWeek).toLocaleString()], ['Sessions', sessionsWeek], ['PRs set', prCount]].map(([l,v]) => `
          <div style="border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);padding:8px 10px">

window.toggleScheduleEdit = function(id) {
  const r = S.routines.find(x => x.id === id);
  if (!r) return;
  const toggle = document.getElementById('sched-toggle');
  const editing = toggle.textContent === 'Edit';
  if (editing) {
    document.querySelectorAll('.sched-day').forEach(b => {
      b.disabled = false;
      b.dataset.locked = '0';
      b.onclick = () => {
        const d = parseInt(b.dataset.day);
        let s = (r._draftSchedule || r.schedule || []).slice();
        s = s.includes(d) ? s.filter(x => x!==d) : s.concat(d);
        r._draftSchedule = s;
        b.classList.toggle('selected', s.includes(d));
      };
    });
    toggle.textContent = 'Save';
  } else {
    if (r._draftSchedule) {
      updateRoutine(id, { schedule: r._draftSchedule });
      delete r._draftSchedule;
    }
  }
};
