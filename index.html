<style>
/* ============================================================
   FOUNDRY OS. — single-file build
   ============================================================ */

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, "Segoe UI", Roboto, sans-serif;
  background: #0a0a0c;
  color: #fff;
  /* Lock the page itself; only the inner scroller scrolls. Prevents pull-to-refresh in WebView. */
  overflow: hidden;
  overscroll-behavior: none;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  -webkit-font-smoothing: antialiased;
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}
/* Dedicated scrolling container — only this scrolls, so the OS never sees the page itself reach the top. */
#scroller {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}
button, input { font-family: inherit; }
button { cursor: pointer; }
input, textarea {
  -webkit-user-select: text; user-select: text;
  color: rgba(255,255,255,0.95) !important;
  caret-color: rgba(255,255,255,0.85);
  background-color: rgba(255,255,255,0.04) !important;
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 14px;
  outline: none;
  width: 100%;
}
input:focus, textarea:focus {
  background-color: rgba(255,255,255,0.06) !important;
  border-color: rgba(255,255,255,0.25);
}
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.35) !important; }
input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus {
  -webkit-text-fill-color: rgba(255,255,255,0.95) !important;
  -webkit-box-shadow: 0 0 0 1000px #1a1a1f inset !important;
  transition: background-color 5000s ease-in-out 0s;
}
input[type="number"]::-webkit-inner-spin-button,
input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }
input[type="range"] { accent-color: #7B6FB0; padding: 0; background: transparent !important; border: none; }
/* Hide scrollbars globally — scrolling still works, just no visible bar */
::-webkit-scrollbar { width: 0; height: 0; display: none; }
::-webkit-scrollbar-thumb { background: transparent; }
* { scrollbar-width: none; -ms-overflow-style: none; }

/* App background */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse 90% 60% at 20% 0%, rgba(74,144,194,0.10), transparent 60%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(123,111,176,0.10), transparent 60%);
  transition: background 0.6s ease;
}
body.urgency::before {
  background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(217,83,79,0.18), transparent 60%);
  background-color: #1a0a0c;
}
body.elite::before {
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(229,184,114,0.12), transparent 60%),
    radial-gradient(ellipse 80% 50% at 80% 100%, rgba(123,111,176,0.10), transparent 60%);
}

#app {
  position: relative; z-index: 1;
  max-width: 640px; margin: 0 auto;
  padding: max(env(safe-area-inset-top), 20px) 16px 120px 16px;
}

/* Glass card */
.glass {
  position: relative;
  -webkit-backdrop-filter: blur(20px);
  backdrop-filter: blur(20px);
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), 0 4px 24px rgba(0,0,0,0.3);
}
.glass.p-5 { padding: 20px; }
.glass.p-4 { padding: 16px; }

/* Header */
header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px;
}
h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; color: rgba(255,255,255,0.95); }
.eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.28em; color: rgba(255,255,255,0.35); margin-bottom: 4px; }
.lv-pill {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
  padding: 6px 10px; border-radius: 999px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.85);
}
.lv-pill.elite {
  background: rgba(229,184,114,0.12);
  border-color: rgba(229,184,114,0.4);
  color: #E5B872;
  box-shadow: 0 0 12px rgba(229,184,114,0.25);
}
.ap-pill {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; letter-spacing: 0.18em;
  padding: 2px 8px; border-radius: 999px;
  background: rgba(229,184,114,0.12);
  border: 1px solid rgba(229,184,114,0.4);
  color: #E5B872;
  margin-top: 4px;
  cursor: pointer;
}

/* Tab bar */
#tabbar {
  position: fixed; left: 12px; right: 12px;
  bottom: max(env(safe-area-inset-bottom), 12px);
  z-index: 30;
  max-width: 616px; margin: 0 auto;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 28px;
  display: flex; justify-content: space-around;
  padding: 8px 6px;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.06);
}
.tab-btn {
  flex: 1; min-width: 0;
  background: transparent; border: none;
  padding: 8px 4px; border-radius: 16px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  color: rgba(255,255,255,0.45);
  transition: color 0.2s, background 0.2s;
  position: relative;
}
.tab-btn.active {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.95);
}
.tab-btn span { font-size: 9px; font-weight: 500; letter-spacing: 0.04em; }
.tab-btn svg { width: 18px; height: 18px; }

/* Buttons */
.btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.85);
  padding: 6px 12px; border-radius: 999px;
  font-size: 12px; font-weight: 500;
  display: inline-flex; align-items: center; gap: 6px;
  transition: background 0.15s;
}
.btn:hover { background: rgba(255,255,255,0.10); }
.btn-primary {
  background: rgba(255,255,255,0.95);
  color: rgba(0,0,0,0.9);
  border: none;
  padding: 12px 20px; border-radius: 14px;
  font-weight: 600; font-size: 14px;
  width: 100%;
}
.btn-danger {
  background: #D9534F; color: #fff; border: 1px solid #D9534F;
  padding: 8px 16px; border-radius: 999px; font-size: 12px; font-weight: 600;
}
.btn-pillar { padding: 6px 16px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid; }
.btn[disabled], button[disabled] { opacity: 0.5; cursor: not-allowed; }

/* Stat bar */
.statbar {
  width: 100%; height: 6px; background: rgba(255,255,255,0.06);
  border-radius: 999px; overflow: hidden;
}
.statbar > div { height: 100%; border-radius: 999px; transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); opacity: 0.85; }

/* Ring */
.ring-wrap { position: relative; display: inline-flex; align-items: center; justify-content: center; }
.ring-wrap svg { transform: rotate(-90deg); }
.ring-wrap circle { transition: stroke-dashoffset 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); }
.ring-label {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.ring-sub { font-size: 8px; text-transform: uppercase; letter-spacing: 0.22em; color: rgba(255,255,255,0.45); font-weight: 500; }
.ring-val { font-size: 20px; font-weight: 500; color: rgba(255,255,255,0.95); font-variant-numeric: tabular-nums; }

/* Pillar card */
.pillar-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 12px;
}
.pillar-card .pc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.pillar-card .pc-name { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.85); display: flex; align-items: center; gap: 6px; }
.pillar-card .pc-lv { font-size: 10px; padding: 2px 6px; border-radius: 999px; font-variant-numeric: tabular-nums; }
.pillar-card .pc-xp { display: flex; justify-content: space-between; font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 4px; font-variant-numeric: tabular-nums; }

/* Habit / Routine row */
.row-card {
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 14px;
  margin-bottom: 10px;
}
.row-card .row-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
.row-card .row-icon {
  width: 40px; height: 40px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.row-card .row-name { font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.95); line-height: 1.3; word-break: break-word; }
.row-card .row-meta {
  display: flex; flex-wrap: wrap; gap: 4px 8px;
  font-size: 11px; color: rgba(255,255,255,0.50); margin-top: 4px;
}
.row-card .row-actions {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.05); gap: 8px;
}
.row-card .row-actions-left { display: flex; gap: 6px; }

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 50;
  background: rgba(0,0,0,0.7);
  -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
  display: flex; align-items: flex-end; justify-content: center; padding: 16px;
  animation: fadeIn 0.2s ease;
}
@media (min-width: 640px) { .modal-backdrop { align-items: center; } }
.modal {
  width: 100%; max-width: 440px;
  -webkit-backdrop-filter: blur(20px); backdrop-filter: blur(20px);
  background: rgba(21,21,26,0.95);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 24px; padding: 24px;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 24px 60px rgba(0,0,0,0.6);
  animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(60px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-head {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
}
.modal-head h3 { margin: 0; font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.95); }
.modal-close {
  width: 32px; height: 32px; border-radius: 999px;
  background: rgba(255,255,255,0.06); border: none;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7);
}
.modal label { font-size: 11px; color: rgba(255,255,255,0.5); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.modal-form > div + div { margin-top: 16px; }

/* Floating XP */
.float-xp {
  position: fixed; bottom: 30%;
  font-size: 22px; font-weight: 500; font-variant-numeric: tabular-nums;
  pointer-events: none; z-index: 40;
  animation: floatUp 1.4s ease-out forwards;
}
@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 0) scale(0.7); }
  20% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -120px) scale(1); }
}

/* Full-screen overlays */
.fs-overlay {
  position: fixed; inset: 0; z-index: 60;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  background: rgba(0,0,0,0.6);
  animation: fadeIn 0.3s ease;
}
.fs-content {
  text-align: center; padding: 0 24px;
  animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
@keyframes popIn { from { transform: scale(0.7) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.fs-eyebrow { font-size: 11px; text-transform: uppercase; letter-spacing: 0.32em; color: rgba(255,255,255,0.55); margin-bottom: 8px; }
.fs-big { font-size: 68px; font-weight: 600; font-variant-numeric: tabular-nums; color: rgba(255,255,255,0.95); line-height: 1; }
.fs-sub { font-size: 12px; color: rgba(255,255,255,0.55); margin-top: 12px; display: inline-flex; align-items: center; gap: 6px; }

/* Tab content fade */
.tab-content {
  animation: tabIn 0.25s ease;
}
@keyframes tabIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* Shake for damage */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-10px); }
  40% { transform: translateX(10px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
.shake { animation: shake 0.5s; }

/* Volume chart bar */
.vol-bar { transition: height 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); min-height: 2px; border-radius: 4px 4px 0 0; }

/* Chat bubble */
.bubble {
  max-width: 85%; padding: 10px 14px; border-radius: 18px;
  font-size: 14px; line-height: 1.5; white-space: pre-line;
  -webkit-backdrop-filter: blur(12px); backdrop-filter: blur(12px);
  word-wrap: break-word;
}
.bubble.user { background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.12); color: rgba(255,255,255,0.9); align-self: flex-end; }
.bubble.system { background: rgba(123,111,176,0.10); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); align-self: flex-start; }

/* Misc grid utils */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }

/* Day chip */
.day-chip {
  width: 100%; height: 32px; font-size: 10px; font-weight: 500;
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.07);
  background: rgba(255,255,255,0.03);
  color: rgba(255,255,255,0.55);
}
.day-chip.selected {
  background: rgba(217,83,79,0.18);
  border-color: rgba(217,83,79,0.45);
  color: #E07975;
}

/* Set logger row */
.set-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.set-row input { padding: 6px 8px; font-size: 12px; text-align: center; }
.set-row .set-label { font-size: 10px; color: rgba(255,255,255,0.4); width: 24px; }
.set-row .set-unit { font-size: 10px; color: rgba(255,255,255,0.35); }

/* Progress segment */
.seg-bar {
  display: flex; padding: 4px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  margin-bottom: 12px;
}
.seg-bar button {
  flex: 1; padding: 6px 12px; border-radius: 10px;
  background: transparent; border: none;
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,0.55);
  transition: all 0.2s;
}
.seg-bar button.active {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.95);
}

/* Scroll chips */
.chip-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin: -4px; padding-left: 4px; padding-right: 4px; }
.chip-scroll::-webkit-scrollbar { display: none; }

/* Section titles */
.section-title { font-size: 15px; font-weight: 600; color: rgba(255,255,255,0.9); margin: 0; }
</style>
</head>

/* ============================================================

   ============================================================ */
const xpForLevel = (lvl) => Math.floor(100 * Math.pow(lvl, 1.5));
const hoursSince = (ts) => (Date.now() - ts) / 36e5;
const daysSince = (ts) => (Date.now() - ts) / 86400000;
const dayKey = (d = new Date()) => d.toISOString().slice(0,10);

const startOfWeek = () => {
  const d = new Date();
  const day = d.getDay();
  const diff = day === 0 ? 6 : day - 1;
  d.setHours(0,0,0,0);
  d.setDate(d.getDate() - diff);
  return d.getTime();
};
const endOfWeek = () => {
  const d = new Date(startOfWeek());
  d.setDate(d.getDate() + 6);
  d.setHours(23,59,59,999);
  return d.getTime();
};

const calcTotalLevel = (pillars) => {
  const lvls = Object.values(pillars).map(p => p.level);
  return Math.max(1, Math.floor(lvls.reduce((a,b) => a+b, 0) / lvls.length));
};

const disciplineMultiplier = (d) => {
  if (d >= 90) return { mult: 1.5, tier: 'Elite',      color: '#E5B872' };
  if (d >= 70) return { mult: 1.2, tier: 'Consistent', color: '#7B6FB0' };
  if (d >= 50) return { mult: 1.0, tier: 'Steady',     color: '#C99664' };
  return            { mult: 0.5, tier: 'Slacking',   color: '#D9534F' };
};

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

let S = (() => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState();
    const parsed = JSON.parse(raw);
    const merged = Object.assign(defaultState(), parsed);
    // Migration: water used to be in cups (typical values 0-20). If goal is small, convert.
    if (merged.waterGoal && merged.waterGoal < 50) {
      merged.waterGoal = 2000;
      const conv = {};
      Object.entries(merged.water || {}).forEach(([d, v]) => { conv[d] = Math.round(v * 250); });
      merged.water = conv;
    }
    // Bulletproof nutrition fields — guarantee shape regardless of old data
    if (!merged.nutrition || typeof merged.nutrition !== 'object' || Array.isArray(merged.nutrition)) {
      merged.nutrition = {};
    }
    if (!merged.nutritionGoals || typeof merged.nutritionGoals !== 'object') {
      merged.nutritionGoals = { cals: 2500, protein: 160 };
    }
    if (typeof merged.nutritionGoals.cals !== 'number') merged.nutritionGoals.cals = 2500;
    if (typeof merged.nutritionGoals.protein !== 'number') merged.nutritionGoals.protein = 160;
    // Ensure each nutrition day record has a valid shape
    Object.keys(merged.nutrition).forEach(k => {
      const d = merged.nutrition[k];
      if (!d || typeof d !== 'object') { delete merged.nutrition[k]; return; }
      if (typeof d.cals !== 'number') d.cals = 0;
      if (typeof d.protein !== 'number') d.protein = 0;
      if (!Array.isArray(d.entries)) d.entries = [];
    });
    return merged;
  } catch { return defaultState(); }
})();

function persist() {

function discipline() {
  const cutoff = Date.now() - 30 * 86400000;
  const recent = S.disciplineEvents.filter(e => e.ts >= cutoff);
  const floor = S.ascensions?.disciplineFloor ? S.ascensions.disciplineFloor * 5 : 0;
  if (recent.length === 0) return Math.max(100, floor);
  const c = recent.filter(e => e.type === 'completion').length;
  return Math.max(Math.round((c / recent.length) * 100), floor);
}

function maxHp() { return S.maxHp + (S.ascensions?.hpMax || 0) * 10; }

/* ============================================================
   XP / LEVELING
   ============================================================ */
function applyXpToPillar(pillarKey, amount) {
  const p = { ...S.pillars[pillarKey] };
  let xp = p.xp + amount;
  let level = p.level;
  const ups = [];
  let needed = xpForLevel(level);
  let safety = 0;
  while (xp >= needed && safety < 50) {
    xp -= needed;
    level += 1;
    ups.push({ pillar: pillarKey, newLevel: level });
    needed = xpForLevel(level);
    safety++;
  }
  S.pillars[pillarKey] = { level, xp };
  return ups;
}

function awardXp(baseXp, pillarKey, applyMult = true) {
  const m = applyMult ? disciplineMultiplier(discipline()).mult : 1;
  const ascBoost = 1 + (S.ascensions?.xpBoost || 0) * 0.05;
  const finalXp = Math.round(baseXp * m * ascBoost);
  const ups = applyXpToPillar(pillarKey, finalXp);
  S.lifetimeXp += finalXp;
  S.ascensionPoints += ups.length;
  if (ups.length > 0) {
    const last = ups[ups.length - 1];
    showLevelUp(last.pillar, last.newLevel);
  }
  return finalXp;
}

function checkPerfectDay() {
  const today = dayKey();
  if (S.perfectDays.includes(today)) return;
  if (S.habits.length === 0) return;
  const allDone = S.habits.every(h => {
    if (!h.lastCheckIn) return false;
    const grace = FREQUENCIES.find(f => f.id === h.frequency).hours;
    return hoursSince(h.lastCheckIn) < grace * 0.9;
  });
  if (!allDone) return;
  S.perfectDays.push(today);
  const per = Math.floor(XP.PERFECT_DAY / 4);
  Object.keys(PILLARS).forEach(p => awardXp(per, p, true));
  spawnFloat(`PERFECT DAY +${XP.PERFECT_DAY} XP`, '#E5B872');
  S.log.unshift({ id: `${Date.now()}-perfect`, ts: Date.now(), type: 'victory',
    text: `🌟 PERFECT DAY · all habits cleared · +${XP.PERFECT_DAY} XP` });
}

/* ============================================================
   ACTIONS
   ============================================================ */
function checkInHabit(id) {
  const h = S.habits.find(x => x.id === id);
  if (!h) return;
  const grace = FREQUENCIES.find(f => f.id === h.frequency).hours;
  if (h.lastCheckIn && hoursSince(h.lastCheckIn) < grace * 0.9) return;

  const continued = h.lastCheckIn && hoursSince(h.lastCheckIn) < grace * 1.5;
  const newStreak = continued ? h.streak + 1 : 1;
  const streakMult = newStreak >= 7 ? 1.5 : newStreak >= 3 ? 1.25 : 1;
  const baseXp = Math.round(XP.HABIT * streakMult);

  const p = PILLARS[h.pillar];
  const display = awardXp(baseXp, h.pillar);
  spawnFloat(`+${display} XP`, p.color);

  const healBase = (h.pillar === 'strength' || h.pillar === 'focus') ? 5 : 0;
  const heal = healBase + (S.ascensions?.healBoost || 0);
  S.hp = Math.min(maxHp(), S.hp + heal);

  // Boss damage — when HP hits 0 from in-app attacks, defer XP until the user confirms the real-world task was done
  if (S.boss && !S.boss.resolved && S.boss.hp > 0) {
    const dmg = 8 + Math.round(baseXp / 4);
    S.boss.hp = Math.max(0, S.boss.hp - dmg);
    if (S.boss.hp === 0) {
      S.boss.resolved = 'pendingConfirmation';
      S.log.unshift({ id: `${Date.now()}-bw`, ts: Date.now(), type: 'gain',
        text: `BOSS HP DEPLETED: "${S.boss.name}". Awaiting completion confirmation in the Arena.` });
    }
  }
  // Carry-over bosses also take damage from habits, same formula
  S.pendingConfirmations.forEach(c => {
    if (c.hp > 0) {
      const dmg = 8 + Math.round(baseXp / 4);
      c.hp = Math.max(0, c.hp - dmg);
    }
  });

  h.streak = newStreak;
  h.lastCheckIn = Date.now();

  S.disciplineEvents = S.disciplineEvents
    .filter(e => e.ts >= Date.now() - 30*86400000)
    .concat({ ts: Date.now(), type: 'completion', source: 'habit', habitId: id });

  S.log.unshift({ id: `${Date.now()}-${id}`, ts: Date.now(), type: 'gain',
    text: `"${h.name}" complete · +${display} XP${streakMult>1?` · ${newStreak}🔥`:''}` });
  S.log = S.log.slice(0, 200);

  checkPerfectDay();
  persist();
  render();
}

function addHabit(data) {
  if (S.habits.length >= 100) return;
  S.habits.push({
    id: `h${Date.now()}${Math.random().toString(36).slice(2,6)}`,
    name: data.name.trim() || 'Untitled',
    pillar: data.pillar,
    frequency: data.frequency,
    streak: 0, lastCheckIn: 0, createdAt: Date.now(),
  });
  persist(); render();
}
function updateHabit(id, data) {
  const h = S.habits.find(x => x.id === id);
  if (!h) return;
  h.name = data.name.trim() || h.name;
  h.pillar = data.pillar;
  h.frequency = data.frequency;
  persist(); render();
}
function removeHabit(id) {
  S.habits = S.habits.filter(h => h.id !== id);
  persist(); render();
}

function setBoss(name) {
  S.boss = {
    name: name.trim() || 'The Boss',
    maxHp: 200, hp: 200,
    weekStart: startOfWeek(), weekEnd: endOfWeek(),
    weekKey: dayKey(new Date(startOfWeek())),
  };
  persist(); render();
}

// User confirmed they completed the boss task → award XP + clear
function confirmBossCompleted() {
  if (!S.boss || S.boss.resolved !== 'pendingConfirmation') return;
  S.boss.resolved = 'victory';
  S.victories += 1;
  const per = Math.floor(XP.BOSS_DEFEAT / 4);
  Object.keys(PILLARS).forEach(pk => awardXp(per, pk, false));
  S.log.unshift({ id: `${Date.now()}-bw`, ts: Date.now(), type: 'victory',
    text: `BOSS DEFEATED: "${S.boss.name}". +${XP.BOSS_DEFEAT} XP bonus.` });
  showVictory();
  persist(); render();
}

// User said no — boss carries over with half its original max HP
function denyBossCompleted() {
  if (!S.boss || S.boss.resolved !== 'pendingConfirmation') return;
  const carry = {
    id: `c-${Date.now()}${Math.random().toString(36).slice(2,5)}`,
    name: S.boss.name,
    maxHp: Math.max(20, Math.floor(S.boss.maxHp / 2)),
    originalMaxHp: S.boss.maxHp,
  };
  carry.hp = carry.maxHp;
  S.pendingConfirmations.push(carry);
  S.defeats += 1;
  // Penalty: 50 HP for not completing the originally-set boss task
  const prevHp = S.hp;
  S.hp = Math.max(0, S.hp - 50);
  triggerShake();
  S.boss.resolved = 'defeat';
  S.log.unshift({ id: `${Date.now()}-carry`, ts: Date.now(), type: 'defeat',
    text: `BOSS UNCOMPLETED: "${S.boss.name}". Carried to next week at half HP (${carry.maxHp}). −50 HP.` });
  if (S.hp <= 0 && prevHp > 0) showDeath();
  persist(); render();
}

// User confirmed they completed a carry-over boss task
function confirmCarryCompleted(id) {
  const idx = S.pendingConfirmations.findIndex(c => c.id === id);
  if (idx < 0) return;
  const c = S.pendingConfirmations[idx];
  S.pendingConfirmations.splice(idx, 1);
  S.victories += 1;
  const per = Math.floor(XP.BOSS_DEFEAT / 4);
  Object.keys(PILLARS).forEach(pk => awardXp(per, pk, false));
  S.log.unshift({ id: `${Date.now()}-cv`, ts: Date.now(), type: 'victory',
    text: `CARRY-OVER DEFEATED: "${c.name}". +${XP.BOSS_DEFEAT} XP bonus.` });
  showVictory();
  persist(); render();
}

// Damage a carry-over boss (from in-app attacks) — separate from the main boss
function damageCarry(carryId, amount) {
  const c = S.pendingConfirmations.find(x => x.id === carryId);
  if (!c) return;
  c.hp = Math.max(0, c.hp - amount);
}

function respawn() {
  S.hp = maxHp();
  S.defeats += 1;
  S.habits.forEach(h => h.streak = 0);
  S.disciplineEvents = [];
  S.log.unshift({ id: `${Date.now()}-sf`, ts: Date.now(), type: 'death',
    text: `SYSTEM FAILURE at LV ${calcTotalLevel(S.pillars)}. HP restored. Streaks & discipline reset. Levels preserved.` });
  S.log = S.log.slice(0, 200);
  closeOverlay();
  persist(); render();
}

function canUpdateNetWorth() {
  const last = S.netWorth.lastUpdate || 0;
  if (!last) return { ok: true };
  const daysSinceLast = (Date.now() - last) / 86400000;
  if (daysSinceLast < 30) {
    return { ok: false, daysLeft: Math.ceil(30 - daysSinceLast) };
  }
  return { ok: true };
}

function updateNetWorth(v) {
  const check = canUpdateNetWorth();
  if (!check.ok) return false;
  S.netWorth.value = v;
  S.netWorth.lastUpdate = Date.now();
  S.netWorth.history = [...(S.netWorth.history || []).slice(-29), { ts: Date.now(), value: v }];
  persist(); render();
  return true;
}

function addRoutine(d) {

function logSession(routineId, exerciseSets) {
  const now = Date.now();
  const session = { id: `s-${now}`, routineId, ts: now, completed: true, exercises: exerciseSets };

  let totalVolume = 0;
  const prList = [];
  Object.entries(exerciseSets).forEach(([exId, sets]) => {
    const valid = sets.filter(s => s.reps > 0 && s.weight >= 0);
    if (!valid.length) return;
    const vol = valid.reduce((sum,s) => sum + s.reps * s.weight, 0);
    const topW = Math.max(...valid.map(s => s.weight));
    totalVolume += vol;
    const exName = S.routines.find(r => r.id === routineId)?.exercises.find(e => e.id === exId)?.name || 'Exercise';
    const existing = S.prs[exId] || { topWeight: 0, topVolume: 0, topWeightTs: 0, topVolumeTs: 0 };
    if (topW > existing.topWeight && existing.topWeight > 0) {
      S.prs[exId] = { ...existing, topWeight: topW, topWeightTs: now };
      prList.push({ exerciseName: exName, type: 'weight', value: topW, prev: existing.topWeight });
    } else if (topW > 0 && existing.topWeight === 0) {
      S.prs[exId] = { ...existing, topWeight: topW, topWeightTs: now };
    }
    if (vol > existing.topVolume && existing.topVolume > 0) {
      S.prs[exId] = { ...(S.prs[exId] || existing), topVolume: vol, topVolumeTs: now };
      if (!prList.find(p => p.exerciseName === exName)) {
        prList.push({ exerciseName: exName, type: 'volume', value: Math.round(vol), prev: Math.round(existing.topVolume) });
      }
    } else if (vol > 0 && existing.topVolume === 0) {
      S.prs[exId] = { ...(S.prs[exId] || existing), topVolume: vol, topVolumeTs: now };
    }
  });

  const baseGymXp = XP.GYM_SESSION + (prList.length * XP.PR_BONUS);
  const display = awardXp(baseGymXp, 'strength');
  spawnFloat(`+${display} XP`, '#D9534F');

  S.hp = Math.min(maxHp(), S.hp + 8 + (S.ascensions?.healBoost || 0));

  if (prList.length > 0) {
    showPR(prList[0]);
  }

  if (S.boss && !S.boss.resolved && S.boss.hp > 0) {
    S.boss.hp = Math.max(0, S.boss.hp - 15);
    if (S.boss.hp === 0) {
      S.boss.resolved = 'pendingConfirmation';
      S.log.unshift({ id: `${now}-bw`, ts: now, type: 'gain',
        text: `BOSS HP DEPLETED: "${S.boss.name}". Awaiting completion confirmation in the Arena.` });
    }
  }
  // Carry-over bosses also damaged by gym sessions
  S.pendingConfirmations.forEach(c => {
    if (c.hp > 0) c.hp = Math.max(0, c.hp - 15);
  });

  S.sessions.push(session);
  S.disciplineEvents = S.disciplineEvents
    .filter(e => e.ts >= now - 30*86400000)
    .concat({ ts: now, type: 'completion', source: 'gym', routineId });

  const routineName = S.routines.find(r => r.id === routineId)?.name || 'Workout';
  prList.forEach(pr => S.log.unshift({
    id: `${now}-pr-${pr.exerciseName}`, ts: now, type: 'pr',
    text: `🏆 PR: ${pr.exerciseName} — ${pr.type === 'weight' ? `${pr.value}kg` : `${pr.value} vol`} (was ${pr.prev || '0'})`,
  }));
  S.log.unshift({ id: `${now}-session`, ts: now, type: 'gain',
    text: `Logged "${routineName}" · vol ${Math.round(totalVolume)} · +${display} XP${prList.length?` (${prList.length} PR${prList.length>1?'s':''})`:''}` });
  S.log = S.log.slice(0, 200);

  UI.gymView = { kind: 'list' };
  persist(); render();
}

function logSleep(hours, quality) {

function updateWaterCardInPlace() {

function updateEnergyScoreInPlace() {

// ============ NUTRITION ============
function ensureNutritionDay(key) {
  if (!S.nutrition[key]) S.nutrition[key] = { cals: 0, protein: 0, entries: [] };
  return S.nutrition[key];
}

function addNutrition(cals, protein) {
  cals = Math.max(0, parseInt(cals) || 0);
  protein = Math.max(0, parseInt(protein) || 0);
  if (cals === 0 && protein === 0) return;
  const today = dayKey();
  const day = ensureNutritionDay(today);
  day.cals += cals;
  day.protein += protein;
  day.entries.push({ ts: Date.now(), cals, protein });
  persist();
  updateFuelInPlace();
}

function undoLastNutrition() {
  const today = dayKey();
  const day = S.nutrition[today];
  if (!day || day.entries.length === 0) return;
  const last = day.entries.pop();
  day.cals = Math.max(0, day.cals - last.cals);
  day.protein = Math.max(0, day.protein - last.protein);
  persist();
  updateFuelInPlace();
}

function resetToday() {
  const today = dayKey();
  if (S.nutrition[today]) {
    delete S.nutrition[today];
    persist();
  }
  updateFuelInPlace();
}

function setNutritionGoals(cals, protein) {
  if (cals && cals > 0) S.nutritionGoals.cals = Math.max(500, Math.min(10000, parseInt(cals)));
  if (protein && protein > 0) S.nutritionGoals.protein = Math.max(10, Math.min(500, parseInt(protein)));
  persist(); render();
}

function updateFuelInPlace() {
  // If user is on Fuel tab, update bars + history live; on dashboard, update mini widget
  const today = dayKey();
  const day = S.nutrition[today] || { cals: 0, protein: 0, entries: [] };
  const calsEl = document.getElementById('fuel-cals-val');
  const proteinEl = document.getElementById('fuel-protein-val');
  const calsBar = document.getElementById('fuel-cals-bar');
  const proteinBar = document.getElementById('fuel-protein-bar');
  if (calsEl) calsEl.textContent = day.cals;
  if (proteinEl) proteinEl.textContent = day.protein;
  if (calsBar) calsBar.style.width = Math.min(100, (day.cals / S.nutritionGoals.cals) * 100) + '%';
  if (proteinBar) proteinBar.style.width = Math.min(100, (day.protein / S.nutritionGoals.protein) * 100) + '%';
  // Dashboard nutrition widget
  const dashCals = document.getElementById('dash-fuel-cals');
  const dashProtein = document.getElementById('dash-fuel-protein');
  const dashCalsBar = document.getElementById('dash-fuel-cals-bar');
  const dashProteinBar = document.getElementById('dash-fuel-protein-bar');
  if (dashCals) dashCals.textContent = day.cals;
  if (dashProtein) dashProtein.textContent = day.protein;
  if (dashCalsBar) dashCalsBar.style.width = Math.min(100, (day.cals / S.nutritionGoals.cals) * 100) + '%';
  if (dashProteinBar) dashProteinBar.style.width = Math.min(100, (day.protein / S.nutritionGoals.protein) * 100) + '%';
  // History list refresh (only if on Fuel tab)
  const histEl = document.getElementById('fuel-history-list');
  if (histEl) histEl.innerHTML = renderFuelHistoryItems();
  // Undo button state
  const undoBtn = document.getElementById('fuel-undo');
  if (undoBtn) {
    const hasEntries = day.entries.length > 0;
    undoBtn.disabled = !hasEntries;
    undoBtn.style.opacity = hasEntries ? '1' : '0.4';
  }
}

function spendAscension(key) {
  if (S.ascensionPoints <= 0) return;
  S.ascensions[key] = (S.ascensions[key] || 0) + 1;
  if (key === 'hpMax') {
    S.hp += 10;
  }
  S.ascensionPoints -= 1;
  persist(); render();
}


/* ============================================================
   DECAY TICK
   ============================================================ */
function decayTick() {
  const now = Date.now();
  let damage = 0;
  let changed = false;
  const cutoff = now - 30 * 86400000;
  S.disciplineEvents = S.disciplineEvents.filter(e => e.ts >= cutoff);

  if (now - S.lastDecayCheck > 30000) {
    S.habits.forEach(h => {
      const g = FREQUENCIES.find(f => f.id === h.frequency).hours;
      if (h.lastCheckIn === 0) return;
      const e = hoursSince(h.lastCheckIn);
      if (e > g * 1.5 && h.streak > 0) {
        const lost = h.streak;
        const dmg = 6 + lost * 2;
        damage += dmg;
        S.disciplineEvents.push({ ts: now, type: 'miss', source: 'habit', habitId: h.id });
        S.log.unshift({ id: `${now}-${h.id}-miss`, ts: now, type: 'miss',
          text: `Missed "${h.name}" — streak of ${lost} broken. −${dmg} HP.` });
        h.streak = 0;
        changed = true;
      }
    });
    S.lastDecayCheck = now;
  }

  // Yesterday's missed gym
  const today = dayKey(new Date(now));
  const y = dayKey(new Date(now - 86400000));
  if (S.lastGymSkipCheck !== today) {
    const yDow = new Date(now - 86400000).getDay();
    const sched = S.routines.filter(r => r.schedule?.includes(yDow));
    sched.forEach(r => {
      const done = S.sessions.some(s => s.routineId === r.id && s.completed && dayKey(new Date(s.ts)) === y);
      if (!done) {
        damage += 8;
        S.disciplineEvents.push({ ts: now, type: 'miss', source: 'gym', routineId: r.id });
        S.log.unshift({ id: `${now}-${r.id}-skip`, ts: now, type: 'miss',
          text: `Skipped scheduled workout: "${r.name}". −8 HP.` });
        changed = true;
      }
    });
    S.lastGymSkipCheck = today;
  }

  // Boss deadline reached — defer to user confirmation in the Arena
  if (S.boss && now > S.boss.weekEnd && !S.boss.resolved) {
    S.boss.resolved = 'pendingConfirmation';
    S.log.unshift({ id: `${now}-bossexpire`, ts: now, type: 'gain',
      text: `BOSS DEADLINE PASSED: "${S.boss.name}". Awaiting completion confirmation in the Arena.` });
    changed = true;
  }

  if (damage > 0) {
    const prev = S.hp;
    S.hp = Math.max(0, S.hp - damage);
    triggerShake();
    if (S.hp <= 0 && prev > 0) {
      showDeath();
    }
    changed = true;
  }
  S.log = S.log.slice(0, 200);
  if (changed) { persist(); render(); }
}

function attachRoutineModalHandlers() {
  let name = '';
  let template = 'full';
  let schedule = [1,3,5];
  const saveBtn = document.getElementById('m-rsave');
  const updateTmpl = () => {
    document.querySelectorAll('.tmpl-btn').forEach(b => {
      const sel = b.dataset.tmpl === template;
      b.style.background = sel ? 'rgba(217,83,79,0.14)' : 'rgba(255,255,255,0.03)';
      b.style.borderColor = sel ? 'rgba(217,83,79,0.5)' : 'rgba(255,255,255,0.07)';
      b.style.color = sel ? '#E07975' : 'rgba(255,255,255,0.7)';
    });
  };
  const updateDays = () => {
    document.querySelectorAll('.day-btn').forEach(b => {
      const sel = schedule.includes(parseInt(b.dataset.day));
      b.classList.toggle('selected', sel);
    });
  };
  document.querySelectorAll('.tmpl-btn').forEach(b => {
    b.onclick = () => { template = b.dataset.tmpl; updateTmpl(); };
  });
  document.querySelectorAll('.day-btn').forEach(b => {
    b.onclick = () => {
      const d = parseInt(b.dataset.day);
      schedule = schedule.includes(d) ? schedule.filter(x => x!==d) : schedule.concat(d);
      updateDays();
    };
  });
  const ni = document.getElementById('m-rname');
  ni.addEventListener('input', e => {
    name = e.target.value;
    saveBtn.disabled = !name.trim();
  });
  saveBtn.onclick = () => {
    if (!name.trim()) return;
    addRoutine({ name, template, schedule });
    closeModal();
  };
  setTimeout(() => ni.focus(), 50);
}

function ringHTML(value, max, color, opts = {}) {
  const size = opts.size || 110;
  const stroke = opts.stroke || 9;
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const pct = Math.max(0, Math.min(1, value / max));
  const id = `rg-${color.replace('#','')}-${size}-${Math.random().toString(36).slice(2,5)}`;
  return `
    <div class="ring-wrap" style="width:${size}px;height:${size}px">
      <svg width="${size}" height="${size}">
        <defs>
          <linearGradient id="${id}" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.95"/>
          </linearGradient>
        </defs>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="${stroke}"/>
        <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="url(#${id})" stroke-width="${stroke}" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${c * (1 - pct)}"/>
      </svg>
      <div class="ring-label">
        <div class="ring-sub">${opts.sublabel || ''}</div>
        <div class="ring-val">${opts.label != null ? opts.label : value}</div>
      </div>
    </div>`;
}

function statBarHTML(value, max, color, h = 6) {
  const pct = Math.max(0, Math.min(100, (value/max)*100));
  return `<div class="statbar" style="height:${h}px"><div style="width:${pct}%;background:${color}"></div></div>`;
}

function sparklineHTML(data, color, opts = {}) {
  if (!data || data.length === 0) return '';
  const w = opts.width || 100;
  const h = opts.height || 28;
  if (data.length === 1) data = [data[0], data[0]];
  const min = Math.min(...data, 0);
  const max = Math.max(...data, 1);
  const range = max - min || 1;
  const path = data.map((v,i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - ((v - min) / range) * h;
    return `${i===0?'M':'L'} ${x.toFixed(1)} ${y.toFixed(1)}`;
  }).join(' ');
  const fill = opts.fill !== false;
  const id = `sp-${color.replace('#','')}-${Math.random().toString(36).slice(2,6)}`;
  return `
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto" preserveAspectRatio="none">
      ${fill?`<defs><linearGradient id="${id}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.35"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
      </linearGradient></defs>
      <path d="${path} L ${w} ${h} L 0 ${h} Z" fill="url(#${id})"/>`:''}
      <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
}

  const todayDone = S.habits.length - dueToday.length;

        </button>
        <button onclick="toggleNetWorth()" id="nw-toggle" ${locked?'disabled':''} style="font-size:11px;color:${locked?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.55)'};background:none;border:none;${locked?'cursor:not-allowed':''}">${locked?`${check.daysLeft}d locked`:'Update'}</button>
      </div>
      <div id="nw-display">
        <div style="display:flex;align-items:flex-end;justify-content:space-between">
          <div>
            <div style="font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.95)">$${nw.value.toLocaleString()}</div>

              <span style="font-variant-numeric:tabular-nums">${delta > 0?'+':''}${delta.toLocaleString()} since last</span>
            </div>

          ${nw.history.length > 1 ? `<div style="width:80px;height:28px">${sparklineHTML(nw.history.map(p => p.value), trendColor, { fill: false, height: 28, width: 80 })}</div>` : ''}

        <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:8px;letter-spacing:0.06em">
          ${locked ? `Next update available in ${check.daysLeft} day${check.daysLeft!==1?'s':''}` : nw.lastUpdate ? `Last updated ${new Date(nw.lastUpdate).toLocaleDateString([], {month:'short',day:'numeric'})} · monthly cadence` : 'Updates allowed once every 30 days'}
        </div>

window.toggleNetWorth = function() {
  if (!canUpdateNetWorth().ok) return;
  const d = document.getElementById('nw-display');
  const e = document.getElementById('nw-editor');
  const t = document.getElementById('nw-toggle');
  const editing = e.style.display === 'block';
  e.style.display = editing ? 'none' : 'block';
  d.style.display = editing ? 'block' : 'none';
  t.textContent = editing ? 'Update' : 'Cancel';
  if (!editing) setTimeout(() => document.getElementById('nw-input').focus(), 50);
};
window.saveNetWorth = function() {
  const n = parseFloat(document.getElementById('nw-input').value) || 0;
  updateNetWorth(n);
};

function renderQuests() {
  const todayDue = S.habits.filter(h => {
    if (!h.lastCheckIn) return true;
    const g = FREQUENCIES.find(f => f.id === h.frequency).hours;
    return hoursSince(h.lastCheckIn) >= g * 0.9;
  });
  const todayDone = S.habits.length - todayDue.length;
  const base = UI.questView === 'today' ? todayDue : S.habits;
  const filtered = UI.questFilter === 'all' ? base : base.filter(h => h.pillar === UI.questFilter);

  const chipBase = (active, color, label, action) => {
    const c = color || '#FFFFFF';
    return `<button onclick="${action}" style="
      flex-shrink:0;padding:6px 12px;border-radius:999px;
      background:${active?c+'1F':'rgba(255,255,255,0.03)'};
      border:1px solid ${active?c+'55':'rgba(255,255,255,0.07)'};
      color:${active?(c==='#FFFFFF'?'#fff':c):'rgba(255,255,255,0.6)'};
      font-size:12px;font-weight:500;
    ">${label}</button>`;
  };

  return `
    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 class="section-title">Quests</h2>
        <button class="btn" onclick="openModal('habit')">${icon('plus', 13)} Add</button>
      </div>

      <div class="seg-bar">
        <button class="${UI.questView==='all'?'active':''}" onclick="setQuestView('all')">All · ${S.habits.length}</button>
        <button class="${UI.questView==='today'?'active':''}" onclick="setQuestView('today')">Today · ${todayDue.length}</button>
      </div>

      ${UI.questView === 'today' ? `
        <div style="font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:12px;display:flex;align-items:center;gap:8px">
          ${icon('activity', 11)} <span>${todayDone} of ${S.habits.length} complete today${todayDone===S.habits.length && S.habits.length>0?' · Perfect Day ⭐':''}</span>
        </div>
      ` : ''}

      <div class="chip-scroll" style="margin-bottom:16px">
        ${chipBase(UI.questFilter === 'all', null, 'All', "setQuestFilter('all')")}
        ${Object.entries(PILLARS).map(([k,p]) => {
          const ct = base.filter(h => h.pillar === k).length;
          return chipBase(UI.questFilter === k, p.color, `${p.label} · ${ct}`, `setQuestFilter('${k}')`);
        }).join('')}
      </div>

      ${filtered.length === 0 ? `
        <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.35);font-size:14px">
          ${UI.questView === 'today' ? 'Nothing due. Rest earned.' : 'No quests yet. Add one to begin.'}
        </div>
      ` : filtered.map(h => habitRowHTML(h)).join('')}

      <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-top:16px;text-align:center;letter-spacing:0.06em">
        ${S.habits.length} / 100 habits
      </div>
    </div>`;
}
window.setQuestView = function(v) { UI.questView = v; render(); };
window.setQuestFilter = function(f) { UI.questFilter = f; render(); };

function habitRowHTML(h) {
  const p = PILLARS[h.pillar];
  const grace = FREQUENCIES.find(f => f.id === h.frequency).hours;
  const elapsed = h.lastCheckIn ? hoursSince(h.lastCheckIn) : Infinity;
  const done = elapsed < grace * 0.9;
  const overdue = elapsed > grace * 1.2;

  return `
    <div class="row-card" style="${done ? `box-shadow:inset 0 0 0 1px ${p.color}40` : ''}">
      <div class="row-top">
        <div class="row-icon" style="background:${p.soft};border:1px solid ${p.color}26;color:${p.color}">
          ${icon(p.icon, 17)}
        </div>
        <div style="flex:1;min-width:0">
          <div class="row-name">${escapeHtml(h.name)}</div>
          <div class="row-meta">
            <span style="color:${p.color};opacity:0.85">${p.label}</span>
            <span style="color:rgba(255,255,255,0.25)">·</span>
            <span>${FREQUENCIES.find(f=>f.id===h.frequency).label}</span>
            <span style="color:rgba(255,255,255,0.25)">·</span>
            <span>+${XP.HABIT} XP</span>
            ${h.streak > 0 ? `<span style="display:inline-flex;align-items:center;gap:4px;color:rgba(252,165,80,0.8)">${icon('flame', 10)} ${h.streak}</span>` : ''}
            ${overdue ? `<span style="display:inline-flex;align-items:center;gap:4px;color:rgba(248,113,113,0.85)">${icon('alert', 10)} overdue</span>` : ''}
          </div>
        </div>
      </div>
      <div class="row-actions">
        <div class="row-actions-left">
          <button class="btn" onclick='openModal("habit-edit", ${JSON.stringify(JSON.stringify(h))})' style="padding:6px 10px;font-size:11px">${icon('pencil', 11)} Edit</button>
          <button class="btn" onclick="removeHabit('${h.id}')" style="padding:6px 10px;font-size:11px;color:rgba(255,150,150,0.85)">${icon('trash', 11)} Delete</button>
        </div>
        <button onclick="checkInHabit('${h.id}')" ${done?'disabled':''} style="
          height:32px;padding:0 16px;border-radius:999px;font-size:11px;font-weight:600;
          background:${done?'rgba(255,255,255,0.06)':p.color+'E6'};
          color:${done?'rgba(255,255,255,0.65)':'#fff'};
          border:1px solid ${done?'rgba(255,255,255,0.08)':p.color};
          ${done?'opacity:0.55':''}
        ">${done?'Done':'Check in'}</button>
      </div>
    </div>`;
}

function renderArena() {
  const now = Date.now();
  const noBoss = !S.boss;
  const pending = S.boss && S.boss.resolved === 'pendingConfirmation';
  const active = S.boss && !S.boss.resolved;
  const won = S.boss && S.boss.resolved === 'victory';
  const lost = S.boss && S.boss.resolved === 'defeat';

  let timeLeft = '';
  if (active) {
    const ms = S.boss.weekEnd - now;
    if (ms > 0) {
      const days = Math.floor(ms / 86400000);
      const hrs = Math.floor((ms % 86400000) / 3600000);
      timeLeft = `${days}d ${hrs}h until Sunday 11:59 PM`;
    } else {
      timeLeft = 'Deadline reached';
    }
  }

  // Carry-over bosses block
  const carryHTML = S.pendingConfirmations.length === 0 ? '' : `

              <span style="font-size:14px;font-weight:500;color:rgba(255,255,255,0.95)">${escapeHtml(c.name)}</span>

            </div>
            ${statBarHTML(c.hp, c.maxHp, '#C99664', 8)}
            ${ready ? `
              <div style="margin-top:12px;font-size:11px;color:rgba(229,184,114,0.85);text-align:center">HP depleted — did you actually complete it?</div>

                <button onclick="confirmCarryCompleted('${c.id}')" style="flex:1;height:32px;border-radius:999px;font-size:11px;font-weight:600;background:#7AB17A;color:#fff;border:none">Yes · +${XP.BOSS_DEFEAT} XP</button>
              </div>
            ` : `
              <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
                <span style="font-size:10px;color:rgba(255,255,255,0.4)">Or confirm completion now:</span>
                <button onclick="confirmCarryCompleted('${c.id}')" style="height:28px;padding:0 12px;border-radius:999px;font-size:10px;font-weight:600;background:rgba(122,177,122,0.15);color:#7AB17A;border:1px solid rgba(122,177,122,0.4)">Mark done</button>
              </div>
            `}
          </div>`;
      }).join('')}
    </div>`;

  return `
    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <h2 class="section-title">The Arena</h2>
        <div style="display:flex;gap:12px;font-size:12px">
          <span style="display:inline-flex;align-items:center;gap:4px;color:rgba(110,231,183,0.8)">${icon('trophy', 12)} ${S.victories}</span>
          <span style="display:inline-flex;align-items:center;gap:4px;color:rgba(248,113,113,0.8)">${icon('skull', 12)} ${S.defeats}</span>
        </div>
      </div>
      ${noBoss ? `
        <div style="text-align:center;padding:32px 0">
          <div style="width:56px;height:56px;margin:0 auto 12px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.55)">${icon('swords', 22)}</div>
          <p style="font-size:14px;color:rgba(255,255,255,0.65);margin:0 auto 16px;max-width:280px">Set your weekly boss. Defeat it for +${XP.BOSS_DEFEAT} XP. Skipping the task carries it over at half HP next week.</p>

          <p style="font-size:13px;color:rgba(255,255,255,0.7);margin:0 0 16px;line-height:1.5">

          </div>
          <div style="display:flex;gap:8px">
            <button onclick="denyBossCompleted()" style="flex:1;height:44px;border-radius:999px;font-size:13px;font-weight:600;background:rgba(217,83,79,0.12);border:1px solid rgba(217,83,79,0.4);color:#E07975">No, not yet</button>
            <button onclick="confirmBossCompleted()" style="flex:1;height:44px;border-radius:999px;font-size:13px;font-weight:600;background:#7AB17A;color:#fff;border:none">Yes, done</button>

          </div>
        </div>
      ` : won ? `
        <div style="text-align:center;padding:24px 0">
          <div style="margin-bottom:8px;color:rgba(252,211,77,0.85)">${icon('trophy', 28)}</div>
          <h3 style="font-size:18px;font-weight:600;color:rgba(255,255,255,0.95);margin:0">Boss Defeated</h3>
          <p style="font-size:14px;color:rgba(255,255,255,0.55);margin:4px 0 16px">"${escapeHtml(S.boss.name)}"</p>
          <button class="btn-primary" style="width:auto;display:inline-block" onclick="openModal('boss')">Set Next Boss</button>
        </div>
      ` : `
        <div style="text-align:center;padding:24px 0">
          <div style="margin-bottom:8px;color:rgba(248,113,113,0.85)">${icon('skull', 28)}</div>
          <h3 style="font-size:18px;font-weight:600;color:rgba(252,165,165,0.95);margin:0">Defeat Recorded</h3>
          <p style="font-size:14px;color:rgba(255,255,255,0.55);margin:4px 0 16px">"${escapeHtml(S.boss.name)}" went uncompleted.</p>
          <button class="btn-primary" style="width:auto;display:inline-block" onclick="openModal('boss')">Set New Boss</button>
        </div>
      `}

// Expose carry/confirmation handlers
window.confirmBossCompleted = confirmBossCompleted;
window.denyBossCompleted = denyBossCompleted;
window.confirmCarryCompleted = confirmCarryCompleted;
window.denyCarry = function(id) {
  // Just resets the carry's HP back to full so it can be attacked again, but doesn't dismiss.
  // Alternatively, drop it entirely. For now, restore HP so they can keep grinding.
  const c = S.pendingConfirmations.find(x => x.id === id);
  if (c) { c.hp = c.maxHp; persist(); render(); }
};
// Manually mark an active boss as pending (early completion path)
window.markBossPending = function() {
  if (!S.boss || S.boss.resolved) return;
  S.boss.hp = 0;
  S.boss.resolved = 'pendingConfirmation';
  persist(); render();
};

function renderGym() {
  if (UI.gymView.kind === 'detail') return renderRoutineDetail(UI.gymView.id);
  if (UI.gymView.kind === 'log') return renderSessionLogger(UI.gymView.id);

  // Volume chart
  const last7Vol = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(Date.now() - i*86400000);
    const k = dayKey(d);
    const vol = S.sessions.filter(s => dayKey(new Date(s.ts)) === k).reduce((sum, s) => {
      let v = 0;
      Object.values(s.exercises || {}).forEach(sets => sets.forEach(set => v += (set.reps||0)*(set.weight||0)));
      return sum + v;
    }, 0);
    last7Vol.push(vol);
  }
  const totalWeek = last7Vol.reduce((a,b) => a+b, 0);
  const sessionsWeek = S.sessions.filter(s => Date.now() - s.ts < 7*86400000).length;
  const prCount = Object.keys(S.prs).length;
  const max = Math.max(...last7Vol, 1);

  return `
    <div class="glass p-5" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:rgba(255,255,255,0.7)">${icon('bar', 16)}</span>
          <h2 class="section-title">7-Day Volume</h2>
        </div>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4)">Reps × weight</span>
      </div>
      <div>
        <div style="display:flex;align-items:flex-end;gap:6px;height:80px">
          ${last7Vol.map((v, i) => {
            const h = max > 0 ? (v/max)*100 : 0;
            const isToday = i === last7Vol.length - 1;
            return `
              <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                <div style="font-size:8px;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.4)">${v>0?Math.round(v):''}</div>
                <div class="vol-bar" style="height:${Math.max(2,h)}%;width:100%;background:${v===0?'rgba(255,255,255,0.05)':isToday?'#D9534F':'rgba(217,83,79,0.5)'}"></div>
              </div>`;
          }).join('')}
        </div>
        <div style="display:flex;gap:6px;margin-top:4px">
          ${['6d','5d','4d','3d','2d','1d','Today'].map(l => `<div style="flex:1;text-align:center;font-size:9px;color:rgba(255,255,255,0.35);font-variant-numeric:tabular-nums">${l}</div>`).join('')}
        </div>
      </div>
      <div class="grid-3" style="margin-top:16px">
        ${[['This week', Math.round(totalWeek).toLocaleString()], ['Sessions', sessionsWeek], ['PRs set', prCount]].map(([l,v]) => `
          <div style="border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);padding:8px 10px">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4)">${l}</div>
            <div style="font-size:16px;font-weight:600;font-variant-numeric:tabular-nums;color:rgba(255,255,255,0.95)">${v}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 class="section-title">Routines</h2>
        <button class="btn" onclick="openModal('routine')">${icon('plus', 13)} Routine</button>
      </div>
      ${S.routines.length === 0 ? `
        <div style="text-align:center;padding:40px 0;color:rgba(255,255,255,0.35);font-size:14px">No routines. Create one to start.</div>
      ` : S.routines.map(r => routineCardHTML(r)).join('')}
    </div>
  `;
}

function routineCardHTML(r) {
  const tmpl = ROUTINE_TEMPLATES.find(t => t.id === r.template);
  const today = new Date().getDay();
  const isToday = r.schedule?.includes(today);

window.toggleScheduleEdit = function(id) {
  const r = S.routines.find(x => x.id === id);
  if (!r) return;
  const toggle = document.getElementById('sched-toggle');
  const editing = toggle.textContent === 'Edit';
  if (editing) {
    document.querySelectorAll('.sched-day').forEach(b => {
      b.disabled = false;
      b.dataset.locked = '0';
      b.onclick = () => {
        const d = parseInt(b.dataset.day);
        let s = (r._draftSchedule || r.schedule || []).slice();
        s = s.includes(d) ? s.filter(x => x!==d) : s.concat(d);
        r._draftSchedule = s;
        b.classList.toggle('selected', s.includes(d));
      };
    });
    toggle.textContent = 'Save';
  } else {
    if (r._draftSchedule) {
      updateRoutine(id, { schedule: r._draftSchedule });
      delete r._draftSchedule;
    }
  }
};
window.toggleAddExercise = function() {
  const row = document.getElementById('ex-add-row');
  const t = document.getElementById('ex-toggle');
  const showing = row.style.display === 'block';
  row.style.display = showing ? 'none' : 'block';
  t.textContent = showing ? '+ Add' : 'Cancel';
  if (!showing) setTimeout(() => document.getElementById('ex-name')?.focus(), 50);
};
window.confirmAddExercise = function(routineId) {
  const v = document.getElementById('ex-name').value.trim();
  if (!v) return;
  addExerciseToRoutine(routineId, v);
};
let _delConfirm = null;
window.confirmDeleteRoutine = function(id) {
  const btn = document.getElementById('del-btn');
  if (_delConfirm === id) {
    removeRoutine(id);
    _delConfirm = null;
    return;
  }
  _delConfirm = id;
  btn.textContent = 'Tap again to confirm';
  btn.style.background = 'rgba(217,83,79,0.18)';
  btn.style.borderColor = 'rgba(217,83,79,0.5)';
  btn.style.color = '#E07975';
  setTimeout(() => {
    if (_delConfirm === id) {
      _delConfirm = null;
      try {
        btn.textContent = 'Delete Routine';
        btn.style.background = 'rgba(255,255,255,0.04)';
        btn.style.borderColor = 'rgba(255,255,255,0.08)';

};

function renderSessionLogger(id) {

function setRowHTML(exId, i, s, ref) {
  let beating = '';
  if (ref) {
    const cur = (s.reps||0)*(s.weight||0);
    const old = (ref.reps||0)*(ref.weight||0);
    if (cur > old && cur > 0) beating = `<span style="color:rgba(110,231,183,0.85)">${icon('up', 11)}</span>`;
    else if (cur > 0 && cur < old) beating = `<span style="color:rgba(248,113,113,0.7)">${icon('down', 11)}</span>`;
  }
  return `
    <div class="set-row">
      <span class="set-label">#${i+1}</span>
      <input type="number" inputmode="numeric" value="${s.reps}" oninput="updateSet('${exId}', ${i}, 'reps', this.value)" />
      <span class="set-unit">reps</span>
      <input type="number" inputmode="decimal" step="0.5" value="${s.weight}" oninput="updateSet('${exId}', ${i}, 'weight', this.value)" />
      <span class="set-unit">kg</span>
      <span style="width:16px;display:flex;align-items:center;justify-content:center">${beating}</span>
      ${(_logState.data[exId]||[]).length > 1 ? `<button onclick="removeLogSet('${exId}', ${i})" style="width:20px;height:20px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:none;border:none;color:rgba(255,255,255,0.4)">${icon('x', 10)}</button>` : ''}
    </div>`;
}

window.updateSet = function(exId, i, key, v) {
  if (!_logState) return;
  const num = parseFloat(v) || 0;
  _logState.data[exId][i][key] = num;
  // Recompute total volume in place
  let tv = 0;
  Object.values(_logState.data).forEach(sets => sets.forEach(s => tv += (s.reps||0)*(s.weight||0)));
  const el = document.getElementById('vol-total');
  if (el) el.textContent = Math.round(tv);
};
window.addLogSet = function(exId) {
  if (!_logState) return;
  const last = _logState.data[exId][_logState.data[exId].length - 1];
  _logState.data[exId].push({ reps: last?.reps || 8, weight: last?.weight || 0 });
  render();
};
window.removeLogSet = function(exId, i) {
  if (!_logState) return;
  _logState.data[exId] = _logState.data[exId].filter((_, idx) => idx !== i);
  render();
};
window.cancelLog = function() {
  _logState = null;
  UI.gymView = { kind: 'list' };
  render();
};
window.submitLog = function() {
  if (!_logState) return;
  const data = _logState.data;
  const id = _logState.routineId;
  _logState = null;
  logSession(id, data);
};

function renderFuelHistoryItems() {
  // Last 30 days, newest first, only days with entries
  const entries = Object.entries(S.nutrition || {})
    .filter(([_, d]) => d && (d.cals > 0 || d.protein > 0))
    .sort((a, b) => (a[0] < b[0] ? 1 : -1));
  if (entries.length === 0) {
    return `<div style="text-align:center;padding:24px 0;color:rgba(255,255,255,0.35);font-size:13px">No nutrition logged yet.</div>`;
  }
  return entries.slice(0, 60).map(([date, d]) => {
    const dt = new Date(date + 'T12:00:00');
    const lbl = dt.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' });
    const hitCals = d.cals >= S.nutritionGoals.cals * 0.9 && d.cals <= S.nutritionGoals.cals * 1.1;
    const hitProtein = d.protein >= S.nutritionGoals.protein;
    const both = hitCals && hitProtein;
    return `
      <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);margin-bottom:6px">
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;color:rgba(255,255,255,0.9)">${lbl}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums">${d.cals.toLocaleString()} cals · ${d.protein}g protein</div>
        </div>
        ${both ? `<span style="font-size:11px;color:rgba(122,177,122,0.85)">✓</span>` : ''}
      </div>`;
  }).join('');
}

function renderFuel() {
  const today = dayKey();
  const day = S.nutrition[today] || { cals: 0, protein: 0, entries: [] };
  const calsPct = Math.min(100, (day.cals / S.nutritionGoals.cals) * 100);
  const proteinPct = Math.min(100, (day.protein / S.nutritionGoals.protein) * 100);
  const hasEntries = day.entries.length > 0;

  return `
    <div class="glass p-5" style="margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="color:rgba(255,255,255,0.7)">${icon('utensils', 16)}</span>
          <h2 class="section-title">Fuel</h2>
        </div>
        <button onclick="openModal('fuel-goals')" style="font-size:11px;color:rgba(255,255,255,0.55);background:none;border:none">Goals</button>
      </div>

        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.5)">Calories</span>
          <span style="font-size:14px;font-variant-numeric:tabular-nums">
            <span id="fuel-cals-val" style="font-weight:600;color:#E5B872">${day.cals}</span>
            <span style="color:rgba(255,255,255,0.45)"> / ${S.nutritionGoals.cals.toLocaleString()}</span>
          </span>
        </div>
        <div style="width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden">
          <div id="fuel-cals-bar" style="height:100%;width:${calsPct}%;background:#E5B872;border-radius:999px;transition:width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);opacity:0.85"></div>
        </div>
      </div>

      <!-- Protein -->
      <div style="margin-bottom:16px">
        <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.5)">Protein</span>
          <span style="font-size:14px;font-variant-numeric:tabular-nums">
            <span id="fuel-protein-val" style="font-weight:600;color:#D9534F">${day.protein}</span>
            <span style="color:rgba(255,255,255,0.45)">g / ${S.nutritionGoals.protein}g</span>
          </span>
        </div>
        <div style="width:100%;height:8px;background:rgba(255,255,255,0.06);border-radius:999px;overflow:hidden">
          <div id="fuel-protein-bar" style="height:100%;width:${proteinPct}%;background:#D9534F;border-radius:999px;transition:width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);opacity:0.85"></div>
        </div>
      </div>

      <!-- Quick-add buttons -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin:16px 0 8px">Quick add</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
        <button onclick="addNutrition(100,0)" style="height:36px;border-radius:10px;background:rgba(229,184,114,0.14);border:1px solid rgba(229,184,114,0.35);color:#E5B872;font-size:12px;font-weight:600">+100 cals</button>
        <button onclick="addNutrition(0,25)" style="height:36px;border-radius:10px;background:rgba(217,83,79,0.14);border:1px solid rgba(217,83,79,0.35);color:#E07975;font-size:12px;font-weight:600">+25g protein</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px">
        <button onclick="addNutrition(250,0)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+250 cals</button>
        <button onclick="addNutrition(500,0)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+500 cals</button>
        <button onclick="addNutrition(0,10)" style="height:32px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.75);font-size:11px">+10g protein</button>
      </div>

      <!-- Exact input -->
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.45);margin-bottom:8px">From label</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">

        <input type="number" id="fuel-protein-input" placeholder="Protein (g)" inputmode="numeric" style="text-align:center;font-variant-numeric:tabular-nums;padding:10px;font-size:14px" />
      </div>
      <button onclick="submitExactNutrition()" style="width:100%;height:38px;border-radius:10px;background:rgba(255,255,255,0.95);color:rgba(0,0,0,0.9);border:none;font-weight:600;font-size:13px;margin-bottom:8px">Add Exact Amount</button>

      <!-- Undo / Reset -->
      <div style="display:flex;gap:8px;margin-top:8px">

          ${icon('undo', 11)} Undo last
        </button>
        <button onclick="confirmResetToday()" style="flex:1;height:32px;border-radius:999px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,150,150,0.85);font-size:11px">Reset today</button>
      </div>
    </div>

    <!-- History -->
    <div class="glass p-5">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
        <h2 class="section-title">Fuel History</h2>
        <span style="font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:rgba(255,255,255,0.4)">Last 60 days</span>
      </div>

}

window.addNutrition = addNutrition;
window.undoLastNutrition = undoLastNutrition;
window.submitExactNutrition = function() {
  const cIn = document.getElementById('fuel-cals-input');
  const pIn = document.getElementById('fuel-protein-input');
  const c = parseInt(cIn.value) || 0;
  const p = parseInt(pIn.value) || 0;
  if (c === 0 && p === 0) return;
  addNutrition(c, p);
  cIn.value = '';
  pIn.value = '';
};
let _resetConfirm = false;
window.confirmResetToday = function() {
  if (_resetConfirm) {
    resetToday();
    _resetConfirm = false;
    return;
  }
  _resetConfirm = true;
  // Visual confirm — find the button and re-label it briefly
  const btns = document.querySelectorAll('button');
  let target = null;
  btns.forEach(b => { if (b.textContent.trim() === 'Reset today') target = b; });
  if (target) {
    const orig = target.textContent;
    target.textContent = 'Tap again to confirm';
    target.style.color = '#E07975';
    setTimeout(() => {
      if (target) {
        try { target.textContent = orig; target.style.color = 'rgba(255,150,150,0.85)'; } catch {}
      }
      _resetConfirm = false;
    }, 3000);
  }
};


/* ============================================================
   MAIN RENDER
   ============================================================ */
window.setTab = function(t) {
  UI.tab = t;
  if (t !== 'gym') { UI.gymView = { kind: 'list' }; _logState = null; }
  render();
};

function render() {
  const disc = discipline();
  const inUrgency = disc < 50;
  const isElite = disc >= 90;
  const totalLv = calcTotalLevel(S.pillars);

  document.body.classList.toggle('urgency', inUrgency);
  document.body.classList.toggle('elite', isElite);

  let content = '';
  if (UI.tab === 'dashboard') content = renderDashboard();
  else if (UI.tab === 'quests') content = renderQuests();
  else if (UI.tab === 'arena')  content = renderArena();
  else if (UI.tab === 'gym')    content = renderGym();
  else if (UI.tab === 'fuel')   content = renderFuel();

  const accent = inUrgency ? '#D9534F' : isElite ? '#E5B872' : '#7B6FB0';

  document.getElementById('app').innerHTML = `
    <header>
      <div>
        <div class="eyebrow">Productivity engine</div>
        <h1>Foundry<span style="color:${accent}"> OS</span><span style="color:${accent}">.</span></h1>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
        <span class="lv-pill ${isElite?'elite':''}">LV ${String(totalLv).padStart(2,'0')}</span>
        ${S.ascensionPoints > 0 ? `<button class="ap-pill" onclick="openModal('ascension')">${icon('star', 9)} ${S.ascensionPoints} AP</button>` : ''}
      </div>
    </header>
    <div class="tab-content">${content}</div>
  `;

  // Tab bar
  const tabs = [
    { id: 'dashboard', label: 'Dash',     icon: 'home' },
    { id: 'quests',    label: 'Quests',   icon: 'scroll' },
    { id: 'arena',     label: 'Arena',    icon: 'swords' },
    { id: 'gym',       label: 'Gym',      icon: 'dumbbell' },
    { id: 'fuel',      label: 'Fuel',     icon: 'utensils' },
  ];
  document.getElementById('tabbar').innerHTML = tabs.map(t => `
    <button class="tab-btn ${UI.tab===t.id?'active':''}" onclick="setTab('${t.id}')">
      ${icon(t.icon, 18)}
      <span>${t.label}</span>
    </button>
  `).join('');

  // Modals
  if (UI.modal) {
    const m = UI.modal;
    let html = '';
    if (m.kind === 'habit') html = modalHabit();
    else if (m.kind === 'habit-edit') html = modalHabit(JSON.parse(m.data));
    else if (m.kind === 'routine') html = modalRoutine();
    else if (m.kind === 'boss') html = modalBoss();
    else if (m.kind === 'ascension') html = modalAscension();
    else if (m.kind === 'sleep-history') html = modalSleepHistory();
    else if (m.kind === 'water-history') html = modalWaterHistory();
    else if (m.kind === 'networth-history') html = modalNetWorthHistory();
    else if (m.kind === 'fuel-goals') html = modalFuelGoals();

    document.getElementById('overlays').innerHTML = html;

    if (m.kind === 'habit') attachHabitModalHandlers(null);
    else if (m.kind === 'habit-edit') attachHabitModalHandlers(JSON.parse(m.data));
    else if (m.kind === 'routine') attachRoutineModalHandlers();
    else if (m.kind === 'boss') attachBossModalHandlers();
  } else if (!document.getElementById('overlays').querySelector('.fs-overlay')) {
    // Don't clear if a fullscreen overlay (level up, death, etc) is showing
    document.getElementById('overlays').innerHTML = '';
  }

}

/* ============================================================
   INIT
   ============================================================ */
render();
decayTick();
setInterval(decayTick, 30000);

// Re-render every minute for time-sensitive UI (countdowns, etc)
setInterval(() => {
  if (UI.tab === 'arena') render();
}, 60000);

// Death watcher in case HP hits 0 from a weird state
setInterval(() => {
  if (S.hp <= 0 && !document.querySelector('.fs-overlay')) showDeath();
}, 5000);

/* ============================================================
   SWIPE NAVIGATION
   ============================================================ */
// Swipe left = next tab, swipe right = previous tab.
// Listens on the scroller element so vertical scrolling still works normally.
(function() {
  const TAB_ORDER = ['dashboard', 'quests', 'arena', 'gym', 'fuel'];
  const SWIPE_MIN_X = 70;          // minimum horizontal travel in px
  const SWIPE_MAX_Y = 60;          // maximum vertical drift allowed
  const SWIPE_MAX_TIME = 600;      // maximum gesture duration in ms

  let startX = 0, startY = 0, startT = 0, tracking = false;

  function isInteractiveTarget(el) {
    // Don't hijack swipes that start on inputs, sliders, scrollable rows,
    // buttons within scrolling content, or inside modals.
    while (el && el !== document.body) {
      const tag = (el.tagName || '').toLowerCase();
      if (tag === 'input' || tag === 'textarea' || tag === 'select') return true;
      if (tag === 'button') return true;
      // Inside an open modal or fullscreen overlay
      if (el.classList && (el.classList.contains('modal-backdrop') || el.classList.contains('fs-overlay'))) return true;
      // Horizontally scrollable content (chip rows in Quests)
      if (el.classList && el.classList.contains('chip-scroll')) return true;
      el = el.parentElement;
    }
    return false;
  }

  const scroller = document.getElementById('scroller');
  if (!scroller) return;

  scroller.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    if (isInteractiveTarget(e.target)) { tracking = false; return; }
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startT = Date.now();
    tracking = true;
  }, { passive: true });

  scroller.addEventListener('touchend', (e) => {
    if (!tracking) return;
    tracking = false;
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const dt = Date.now() - startT;
    if (dt > SWIPE_MAX_TIME) return;
    if (Math.abs(dy) > SWIPE_MAX_Y) return;
    if (Math.abs(dx) < SWIPE_MIN_X) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.5) return; // require strong horizontal bias

    // Don't switch tabs if a modal or fullscreen overlay is open
    if (document.querySelector('.modal-backdrop') || document.querySelector('.fs-overlay')) return;
    // Don't switch if user is in a gym sub-view (detail/log) — let them back out manually
    if (UI.tab === 'gym' && UI.gymView && UI.gymView.kind !== 'list') return;

    const curIdx = TAB_ORDER.indexOf(UI.tab);
    if (curIdx === -1) return;
    let nextIdx;
    if (dx < 0) {
      // swipe left → next tab
      nextIdx = curIdx + 1;
      if (nextIdx >= TAB_ORDER.length) return;
    } else {
      // swipe right → previous tab
      nextIdx = curIdx - 1;
      if (nextIdx < 0) return;
    }
    setTab(TAB_ORDER[nextIdx]);
    // Reset scroll position after tab change feels cleaner
    scroller.scrollTop = 0;
  }, { passive: true });
})();
</script>
